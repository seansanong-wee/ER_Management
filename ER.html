<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Unified Operating System (ER-UOS)</title>
        <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --ink: #102033;
            --muted: #64748b;
            --soft: #94a3b8;
            --line: #dbe4ef;
            --line-soft: #edf2f7;
            --danger: #c81e3a;
            --danger-dark: #9f1239;
            --danger-soft: #fff1f3;
            --success: #057a67;
            --success-soft: #eafaf4;
            --info: #2563eb;
            --info-soft: #eff6ff;
            --warning: #b7791f;
            --navy: #152235;
            --navy-2: #1e2f48;
            --shadow-sm: 0 8px 22px rgba(16, 32, 51, .07);
            --shadow-md: 0 18px 38px rgba(16, 32, 51, .12);
            --shadow-lg: 0 24px 64px rgba(16, 32, 51, .16);
            --radius: 8px;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            min-height: 100%;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(200, 30, 58, .07), transparent 32%),
                linear-gradient(225deg, rgba(5, 122, 103, .07), transparent 34%),
                linear-gradient(180deg, #ffffff 0%, var(--bg) 46%, #eaf0f7 100%);
            font-family: "Sarabun", "Noto Sans Thai", "Segoe UI", Tahoma, Arial, sans-serif;
        }

        body { overflow: hidden; }

        button,
        input { font: inherit; }

        button {
            border: 0;
            cursor: pointer;
        }

        button:focus-visible,
        input:focus-visible,
        [role="button"]:focus-visible {
            outline: 3px solid rgba(37, 99, 235, .2);
            outline-offset: 2px;
        }

        .shell {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        .sidebar {
            position: relative;
            z-index: 30;
            width: 296px;
            min-width: 296px;
            display: flex;
            flex-direction: column;
            color: #e5eef8;
            background:
                linear-gradient(180deg, rgba(200, 30, 58, .2), transparent 28%),
                linear-gradient(180deg, rgba(37, 99, 235, .12), transparent 52%),
                linear-gradient(135deg, var(--navy), #0f172a);
            border-right: 1px solid rgba(148, 163, 184, .2);
            box-shadow: 18px 0 48px rgba(16, 32, 51, .18);
            transition: width 180ms ease, min-width 180ms ease, transform 180ms ease;
        }

        .sidebar::before {
            content: "";
            height: 5px;
            background: linear-gradient(90deg, var(--danger), var(--info), var(--success));
        }

        .sidebar.collapsed {
            width: 82px;
            min-width: 82px;
        }

        .brand {
            min-height: 76px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 18px;
            border-bottom: 1px solid rgba(148, 163, 184, .17);
            white-space: nowrap;
        }

        .brand-mark,
        .app-mark,
        .group-mark {
            display: inline-grid;
            place-items: center;
            flex: 0 0 auto;
            border-radius: var(--radius);
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--danger), var(--info));
            box-shadow: 0 14px 30px rgba(200, 30, 58, .25);
        }

        .brand-title {
            display: block;
            color: #ffffff;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.1;
        }

        .brand-subtitle {
            display: block;
            margin-top: 4px;
            color: #b9c8d9;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .nav {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px 18px;
        }

        .nav::-webkit-scrollbar,
        .home::-webkit-scrollbar { width: 10px; }

        .nav::-webkit-scrollbar-thumb,
        .home::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: rgba(148, 163, 184, .28);
            border: 3px solid transparent;
            background-clip: padding-box;
        }

        .nav-group { margin-bottom: 18px; }

        .nav-title {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 0 10px 8px;
            color: #b9d5ff;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .14em;
        }

        .nav-dot,
        .live-dot,
        .status-dot {
            display: inline-block;
            flex: 0 0 auto;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: currentColor;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, .14);
        }

        .nav-button {
            position: relative;
            width: 100%;
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin: 3px 0;
            border-radius: var(--radius);
            background: transparent;
            color: #cbd5e1;
            text-align: left;
            transition: background 140ms ease, color 140ms ease, transform 140ms ease;
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, .08);
            color: #ffffff;
            transform: translateX(2px);
        }

        .nav-button.active {
            background: linear-gradient(90deg, rgba(200, 30, 58, .28), rgba(255, 255, 255, .07));
            color: #ffffff;
            box-shadow: inset 3px 0 0 #f43f5e;
        }

        .nav-main {
            display: block;
            max-width: 185px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.2;
        }

        .nav-sub {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 700;
        }

        .sidebar.collapsed .brand-text,
        .sidebar.collapsed .nav-title span:last-child,
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .user-box { display: none; }

        .sidebar.collapsed .brand,
        .sidebar.collapsed .nav-title,
        .sidebar.collapsed .nav-button {
            justify-content: center;
            padding-left: 0;
            padding-right: 0;
        }

        .sidebar.collapsed .nav-button:hover { transform: none; }

        .sidebar-footer {
            min-height: 82px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid rgba(148, 163, 184, .17);
            color: #94a3b8;
        }

        .user-box {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            color: #ffffff;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(148, 163, 184, .24);
            font-weight: 900;
        }

        .small-name {
            display: block;
            color: #ffffff;
            font-size: 12px;
            font-weight: 900;
            line-height: 1.2;
        }

        .small-role {
            display: block;
            margin-top: 3px;
            font-size: 11px;
            font-weight: 700;
        }

        .icon-button {
            width: 40px;
            height: 40px;
            display: inline-grid;
            place-items: center;
            border-radius: var(--radius);
            background: transparent;
            color: inherit;
            font-size: 20px;
            transition: background 140ms ease, color 140ms ease, transform 140ms ease;
        }

        .icon-button:hover {
            background: rgba(148, 163, 184, .15);
            transform: translateY(-1px);
        }

        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, .46);
        }

        .topbar {
            min-height: 72px;
            display: grid;
            grid-template-columns: minmax(260px, 1fr) minmax(260px, 430px) auto;
            align-items: center;
            gap: 18px;
            padding: 0 22px;
            border-bottom: 1px solid rgba(203, 213, 225, .78);
            background: rgba(255, 255, 255, .9);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow-sm);
            z-index: 12;
        }

        .top-left,
        .top-actions,
        .active-title {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .top-left { gap: 12px; }
        .top-actions { justify-content: flex-end; gap: 8px; color: #475569; }
        .active-title { gap: 12px; }

        .active-name {
            display: block;
            max-width: 430px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--ink);
            font-size: 15px;
            font-weight: 900;
            line-height: 1.15;
        }

        .active-file {
            display: block;
            max-width: 430px;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .command-search {
            position: relative;
            display: flex;
            align-items: center;
        }

        .command-search input {
            width: 100%;
            height: 44px;
            padding: 0 16px 0 42px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            outline: none;
            color: var(--ink);
            background: #ffffff;
            box-shadow: inset 0 1px 0 rgba(15, 23, 42, .02);
            transition: border-color 140ms ease, box-shadow 140ms ease;
        }

        .command-search input:focus {
            border-color: var(--info);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
        }

        .search-symbol {
            position: absolute;
            left: 14px;
            color: #64748b;
            font-size: 17px;
            pointer-events: none;
        }

        .clock {
            height: 38px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: #334155;
            background: #ffffff;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }

        .viewport {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            background: transparent;
        }

        .home {
            height: 100%;
            overflow-y: auto;
            background: transparent;
        }

        .hero {
            position: relative;
            overflow: hidden;
            margin: 22px auto 18px;
            width: min(1220px, calc(100% - 44px));
            min-height: 238px;
            border: 1px solid rgba(219, 228, 239, .86);
            border-radius: var(--radius);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, .98), rgba(248, 250, 252, .93)),
                radial-gradient(circle at 90% 15%, rgba(37, 99, 235, .16), transparent 34%);
            box-shadow: var(--shadow-lg);
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 5px;
            background: linear-gradient(90deg, var(--danger), var(--info), var(--success));
        }

        .hero-inner {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 390px);
            gap: 24px;
            align-items: stretch;
        }

        .hero-main {
            padding: 30px 30px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            width: fit-content;
            min-height: 30px;
            padding: 5px 10px;
            border: 1px solid rgba(200, 30, 58, .18);
            border-radius: 999px;
            color: var(--danger);
            background: rgba(255, 241, 243, .78);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
        }

        .live-dot {
            color: #22c55e;
            background: currentColor;
        }

        h1 {
            margin: 12px 0 12px;
            max-width: 760px;
            color: #0f172a;
            font-size: clamp(30px, 4vw, 50px);
            line-height: 1.12;
            letter-spacing: 0;
        }

        .hero-copy {
            max-width: 780px;
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.75;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }

        .primary-action,
        .secondary-action {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            padding: 10px 15px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 900;
            text-decoration: none;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .primary-action {
            color: #ffffff;
            background: linear-gradient(135deg, var(--danger), var(--danger-dark));
            box-shadow: 0 12px 28px rgba(200, 30, 58, .22);
        }

        .secondary-action {
            color: var(--navy);
            background: #ffffff;
            border: 1px solid var(--line);
        }

        .primary-action:hover,
        .secondary-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(15, 23, 42, .14);
        }

        .ops-panel {
            min-height: 238px;
            padding: 24px;
            display: grid;
            align-content: center;
            border-left: 1px solid rgba(219, 228, 239, .8);
            color: #ffffff;
            background:
                linear-gradient(180deg, rgba(21, 34, 53, .96), rgba(30, 47, 72, .95)),
                linear-gradient(135deg, rgba(200, 30, 58, .18), transparent);
        }

        .ops-head,
        .ops-line,
        .metric-card,
        .group-heading,
        .card-top,
        .card-foot,
        .filter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .ops-head {
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, .12);
            color: #dbe7f5;
            font-size: 12px;
            font-weight: 900;
        }

        .ops-code {
            color: #ffffff;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: .12em;
        }

        .pulse-line {
            width: 100%;
            height: 54px;
            margin: 18px 0 14px;
            color: #f43f5e;
        }

        .ops-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .ops-line {
            min-height: 56px;
            padding: 9px;
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, .08);
            align-items: flex-start;
            flex-direction: column;
        }

        .ops-line strong {
            color: #ffffff;
            font-size: 15px;
        }

        .ops-line span {
            color: #b9c8d9;
            font-size: 11px;
            font-weight: 800;
            line-height: 1.3;
        }

        .content {
            max-width: 1220px;
            margin: 0 auto;
            padding: 0 22px 48px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .metric-card {
            position: relative;
            min-height: 104px;
            padding: 18px 18px 20px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow-sm);
        }

        .metric-card::after {
            content: "";
            position: absolute;
            inset: auto 0 0;
            height: 4px;
            background: var(--metric-accent, var(--info));
        }

        .metric-label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .metric-value {
            display: block;
            margin-top: 8px;
            color: var(--ink);
            font-size: 34px;
            font-weight: 950;
            line-height: 1;
        }

        .metric-hint {
            display: block;
            margin-top: 6px;
            color: var(--soft);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.35;
        }

        .module-count {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: var(--radius);
            color: #ffffff;
            font-size: 15px;
            font-weight: 950;
        }

        .filter-row {
            margin: 4px 0 24px;
            align-items: flex-end;
        }

        .filter-title h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
        }

        .filter-title p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .segmented {
            display: flex;
            gap: 6px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #ffffff;
            box-shadow: var(--shadow-sm);
        }

        .segment {
            min-width: 74px;
            min-height: 36px;
            padding: 8px 13px;
            border-radius: 6px;
            color: #475569;
            background: transparent;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            white-space: nowrap;
            transition: color 140ms ease, background 140ms ease;
        }

        .segment:hover {
            color: var(--navy);
            background: #f1f5f9;
        }

        .segment.active {
            color: #ffffff;
            background: var(--navy);
            box-shadow: 0 8px 18px rgba(15, 23, 42, .16);
        }

        .group-section { margin-bottom: 34px; }

        .group-heading {
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .group-heading-main {
            display: flex;
            align-items: flex-start;
            gap: 13px;
        }

        .group-mark,
        .app-mark {
            width: 50px;
            height: 50px;
            box-shadow: 0 14px 28px rgba(15, 23, 42, .14);
        }

        .group-text h3 {
            margin: 0;
            font-size: 22px;
            line-height: 1.15;
        }

        .subtitle {
            margin-top: 4px;
            color: #475569;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .group-desc {
            margin: 8px 0 0;
            max-width: 720px;
            color: var(--muted);
            line-height: 1.6;
        }

        .badge {
            min-height: 30px;
            display: inline-flex;
            align-items: center;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: #334155;
            background: #ffffff;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .app-card {
            position: relative;
            min-height: 210px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            overflow: hidden;
            border: 1px solid rgba(219, 228, 239, .96);
            border-radius: var(--radius);
            color: var(--ink);
            background: rgba(255, 255, 255, .94);
            box-shadow: var(--shadow-sm);
            text-align: left;
            cursor: pointer;
            text-decoration: none;
            transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
        }

        .app-card::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--card-accent, var(--info)), rgba(255, 255, 255, 0));
        }

        .app-card:hover {
            transform: translateY(-3px);
            border-color: rgba(37, 99, 235, .32);
            box-shadow: var(--shadow-md);
        }

        .app-card:focus-visible {
            outline: 3px solid rgba(37, 99, 235, .2);
            outline-offset: 2px;
        }

        .card-top { align-items: flex-start; }

        .app-mark {
            width: 46px;
            height: 46px;
            font-size: 13px;
            box-shadow: none;
        }

        .open-mini {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            color: #475569;
            background: #ffffff;
            font-size: 18px;
        }

        .open-mini:hover {
            color: var(--info);
            border-color: rgba(37, 99, 235, .25);
            background: var(--info-soft);
        }

        .group-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 14px;
            padding: 5px 8px;
            border-radius: 999px;
            color: #475569;
            background: #f1f5f9;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .05em;
        }

        .app-card h4 {
            margin: 10px 0 6px;
            font-size: 18px;
            line-height: 1.25;
        }

        .app-card p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .card-foot {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #eef2f7;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 800;
        }

        .card-foot span:first-child {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-foot strong {
            color: var(--danger);
            white-space: nowrap;
        }

        .empty-state {
            min-height: 180px;
            padding: 42px 24px;
            border: 1px dashed #b8c6d7;
            border-radius: var(--radius);
            color: var(--muted);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, .96), rgba(248, 250, 252, .9)),
                repeating-linear-gradient(135deg, rgba(37, 99, 235, .04) 0 12px, transparent 12px 24px);
            box-shadow: var(--shadow-sm);
            font-weight: 800;
            text-align: center;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background: #ffffff;
        }

        .hidden { display: none !important; }

        .bg-red { background: var(--danger); }
        .bg-blue { background: var(--info); }
        .bg-zinc { background: #27272a; }
        .bg-indigo { background: #4f46e5; }
        .bg-emerald { background: var(--success); }
        .bg-teal { background: #0d9488; }
        .bg-purple { background: #7c3aed; }
        .bg-orange { background: #ea580c; }
        .bg-cyan { background: #0891b2; }
        .bg-fuchsia { background: #c026d3; }
        .bg-pink { background: #db2777; }
        .bg-amber { background: #d97706; }
        .bg-lime { background: #65a30d; }
        .bg-sky { background: #0284c7; }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            background: rgba(15, 23, 42, .58);
            backdrop-filter: blur(4px);
        }

        @media (max-width: 1120px) {
            .topbar {
                grid-template-columns: minmax(220px, 1fr) minmax(220px, 360px) auto;
                gap: 12px;
            }

            .hero-inner { grid-template-columns: 1fr; }

            .ops-panel {
                border-left: 0;
                border-top: 1px solid rgba(219, 228, 239, .8);
            }

            .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 820px) {
            .sidebar {
                position: fixed;
                inset: 0 auto 0 0;
                transform: translateX(-100%);
            }

            .sidebar.open { transform: translateX(0); }

            .sidebar.collapsed {
                width: 296px;
                min-width: 296px;
            }

            .sidebar.collapsed .brand-text,
            .sidebar.collapsed .nav-title span:last-child,
            .sidebar.collapsed .nav-label,
            .sidebar.collapsed .user-box { display: block; }

            .sidebar.collapsed .brand,
            .sidebar.collapsed .nav-title,
            .sidebar.collapsed .nav-button {
                justify-content: flex-start;
                padding-left: 12px;
                padding-right: 12px;
            }

            .overlay.show { display: block; }

            .topbar {
                min-height: 68px;
                grid-template-columns: minmax(0, 1fr) auto;
                padding: 0 14px;
            }

            .command-search,
            .clock { display: none; }

            .active-name,
            .active-file { max-width: 48vw; }

            .hero {
                width: min(100% - 20px, 1220px);
                margin-top: 10px;
            }

            .hero-main,
            .ops-panel { padding: 22px 18px; }

            .content { padding: 0 10px 38px; }

            .hero-actions,
            .filter-row,
            .group-heading {
                align-items: stretch;
                flex-direction: column;
            }

            .primary-action,
            .secondary-action { width: 100%; }

            .metric-grid,
            .grid,
            .ops-list { grid-template-columns: 1fr; }

            .segmented {
                width: 100%;
                overflow-x: auto;
            }

            .segment { flex: 1 0 auto; }
            h1 { font-size: 30px; }
            .hero-copy { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside class="sidebar" id="sidebar" aria-label="System list">
            <div class="brand" id="homeButton" role="button" tabindex="0" title="Home">
                <span class="brand-mark">ER</span>
                <span class="brand-text">
                    <span class="brand-title">ER-UOS</span>
                    <span class="brand-subtitle">Unified Command</span>
                </span>
            </div>

            <nav class="nav" id="sideNav"></nav>

            <div class="sidebar-footer">
                <div class="user-box">
                    <span class="avatar">S</span>
                    <span>
                        <span class="small-name">ER Staff</span>
                        <span class="small-role">Operational Portal</span>
                    </span>
                </div>
                <button class="icon-button" id="closeMobile" title="Close menu" aria-label="Close menu">x</button>
            </div>
        </aside>

        <div class="overlay" id="overlay"></div>

        <main class="main">
            <header class="topbar">
                <div class="top-left">
                    <button class="icon-button" id="toggleSidebar" title="Toggle menu" aria-label="Toggle menu">☰</button>
                    <div class="active-title">
                        <span class="app-mark bg-blue" id="activeMark">ER</span>
                        <span>
                            <span class="active-name" id="activeName">ER Unified Operating System</span>
                            <span class="active-file" id="activeFile">ER operational portal</span>
                        </span>
                    </div>
                </div>

                <label class="command-search" for="searchInput">
                    <span class="search-symbol">⌕</span>
                    <input id="searchInput" type="search" autocomplete="off" placeholder="Search systems">
                </label>

                <div class="top-actions">
                    <span class="clock" id="clock"></span>
                    <button class="icon-button hidden" id="openTab" title="Open in new tab" aria-label="Open in new tab">↗</button>
                    <button class="icon-button" id="fullscreen" title="Fullscreen" aria-label="Fullscreen">⛶</button>
                </div>
            </header>

            <section class="viewport">
                <div class="home" id="home"></div>
                <iframe class="hidden" id="appFrame" name="appFrame" title="ER app viewport"></iframe>
            </section>
        </main>
    </div>
    <script>
        const apps = [
            { id: "triage", title: "Thai Triage Pro", desc: "ระบบคัดกรองผู้ป่วยฉุกเฉินพร้อมแนวทาง 3D Red System", file: "triageใหม่.html", short: "TR", color: "bg-red", accent: "#c81e3a" },
            { id: "ucep", title: "UCEP Screening", desc: "คัดกรองผู้ป่วยฉุกเฉินวิกฤตจากอาการสำคัญ", file: "Ucep screening.html", short: "UC", color: "bg-red", accent: "#c81e3a" },
            { id: "er_bed", title: "ER Management", desc: "บริหารเตียง ภาระงาน และสถานะผู้ป่วยใน ER", file: "bed_er.html", short: "BD", color: "bg-blue", accent: "#2563eb" },
            { id: "xray", title: "X-ray Sync", desc: "ติดตามสถานะ X-ray และประสานงานผลตรวจ", file: "x-ray.html", short: "XR", color: "bg-zinc", accent: "#27272a" },
            { id: "kpi", title: "ER KPI Dashboard", desc: "ติดตามตัวชี้วัด คุณภาพบริการ และ MOU", file: "KPI_ER.html", short: "KP", color: "bg-indigo", accent: "#4f46e5" },
            { id: "satisfaction", title: "ความพึงพอใจ", desc: "สรุปผลตอบรับบริการและประสบการณ์ผู้รับบริการ", file: "dasborad ความพึงพอใจ.html", short: "SF", color: "bg-emerald", accent: "#057a67" },
            { id: "nurse_audit", title: "Smart Nurse Audit", desc: "บริหารอัตรากำลังพยาบาลและตรวจสอบภาระงาน", file: "sup_nurse2.html", short: "NA", color: "bg-teal", accent: "#0d9488" },
            { id: "memo_report", title: "ระบบบันทึกข้อความ", desc: "สร้าง พิมพ์ และจัดทำหนังสือราชการ", file: "บันทึกข้อความ (2).html", short: "MM", color: "bg-purple", accent: "#7c3aed" },
            { id: "referral", title: "Referral Hub", desc: "บันทึก ส่งต่อ ติดตาม และประสานเครือข่ายรับส่งผู้ป่วย", file: "Referral_Hub.html", short: "RF", color: "bg-orange", accent: "#ea580c" },
            { id: "er_command", title: "ER Command Center", desc: "ศูนย์สั่งการและภาพรวมปฏิบัติการ ER", file: "ระบบERcomman.html", short: "CC", color: "bg-cyan", accent: "#0891b2" },
            { id: "eoc", title: "ระบบ EOC", desc: "โครงสร้างบัญชาการเหตุการณ์และการตอบโต้ภาวะฉุกเฉิน", file: "EOC.html", short: "EO", color: "bg-fuchsia", accent: "#c026d3" },
            { id: "high_alert", title: "High Alert Drugs", desc: "ติดตามการใช้ยาความเสี่ยงสูงและจุดเฝ้าระวัง", file: "high_alert.html", short: "HA", color: "bg-pink", accent: "#db2777" },
            { id: "ems", title: "Selaphum EMS", desc: "จัดการเครือข่ายกู้ชีพและงานก่อนถึงโรงพยาบาล", file: "selaphum_ems.html", short: "EM", color: "bg-amber", accent: "#d97706" },
            { id: "er_dashboard_csv", title: "ER Dashboard (CSV)", desc: "นำเข้า CSV เพื่อสรุปเวรและภาพรวมงาน ER", file: "er_dashboard_csv.html", short: "CS", color: "bg-lime", accent: "#65a30d" },
            { id: "porter_dashboard", title: "Smart Porter Dashboard", desc: "Dashboard ศูนย์เปล นำเข้า CSV และสรุปงานรับส่งผู้ป่วย", file: "porter_dashboard_hourly.html", short: "SP", color: "bg-sky", accent: "#0284c7" },
            { id: "stroke_fast", title: "Stroke Fast Track", desc: "ติดตามผู้ป่วย Stroke และขั้นตอน Fast Track", file: "stroke_fast.html", short: "ST", color: "bg-red", accent: "#c81e3a" }
        ];

        const appGroups = [
            { id: "EMS", name: "EMS", subtitle: "Pre-hospital & Field Operations", desc: "งานกู้ชีพ ด่านหน้า เหตุฉุกเฉิน และการคัดกรองก่อนเข้าระบบ", short: "EM", color: "bg-amber", accent: "#d97706", appIds: ["ems", "triage", "ucep", "eoc"] },
            { id: "INHOS", name: "INHOS", subtitle: "In-hospital ER Command", desc: "งานในโรงพยาบาล เตียง ER ทรัพยากร เวชระเบียน คุณภาพ Dashboard และงานสนับสนุนเวร", short: "IN", color: "bg-sky", accent: "#0284c7", appIds: ["er_bed", "xray", "kpi", "er_command", "stroke_fast", "er_dashboard_csv", "porter_dashboard", "nurse_audit", "high_alert", "satisfaction", "memo_report"] },
            { id: "REFER", name: "REFER", subtitle: "Referral Coordination", desc: "ระบบบันทึก ส่งต่อ ติดตาม และประสานเครือข่ายรับส่งผู้ป่วย", short: "RF", color: "bg-emerald", accent: "#057a67", appIds: ["referral"] }
        ];

        const appById = new Map(apps.map(app => [app.id, app]));
        const groups = appGroups.map(group => ({
            ...group,
            apps: group.appIds.map(id => appById.get(id)).filter(Boolean)
        }));

        let activeApp = null;
        let activeFilter = "ALL";
        let searchQuery = "";

        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const sideNav = document.getElementById("sideNav");
        const home = document.getElementById("home");
        const frame = document.getElementById("appFrame");
        const activeName = document.getElementById("activeName");
        const activeFile = document.getElementById("activeFile");
        const activeMark = document.getElementById("activeMark");
        const openTab = document.getElementById("openTab");
        const clock = document.getElementById("clock");
        const searchInput = document.getElementById("searchInput");

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function appUrl(file) {
            return "./" + encodeURI(file);
        }

        function closeMobileMenu() {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
        }

        function setMark(element, item) {
            element.className = "app-mark " + item.color;
            element.textContent = item.short;
        }

        function setShellLabels() {
            sidebar.setAttribute("aria-label", "รายการระบบ");
            document.getElementById("homeButton").title = "กลับหน้าหลัก";
            document.getElementById("toggleSidebar").title = "เปิด/ปิดเมนู";
            document.getElementById("toggleSidebar").setAttribute("aria-label", "เปิด/ปิดเมนู");
            document.getElementById("closeMobile").title = "ปิดเมนู";
            document.getElementById("closeMobile").setAttribute("aria-label", "ปิดเมนู");
            document.getElementById("closeMobile").textContent = "×";
            document.getElementById("toggleSidebar").textContent = "☰";
            document.querySelector(".search-symbol").textContent = "⌕";
            searchInput.placeholder = "ค้นหาระบบ เช่น triage, refer, x-ray";
            openTab.title = "เปิดระบบนี้ในแท็บใหม่";
            openTab.setAttribute("aria-label", "เปิดระบบนี้ในแท็บใหม่");
            openTab.textContent = "↗";
            document.getElementById("fullscreen").title = "เต็มจอ";
            document.getElementById("fullscreen").setAttribute("aria-label", "เต็มจอ");
            document.getElementById("fullscreen").textContent = "⛶";
        }

        function openApp(app) {
            activeApp = app;
            home.classList.add("hidden");
            frame.src = appUrl(app.file);
            frame.title = app.title + " - " + app.file;
            frame.classList.remove("hidden");
            activeName.textContent = app.title;
            activeFile.textContent = app.file;
            setMark(activeMark, app);
            openTab.classList.remove("hidden");
            renderNav();
            closeMobileMenu();
            frame.focus();
        }

        function showHome() {
            activeApp = null;
            frame.src = "about:blank";
            frame.classList.add("hidden");
            home.classList.remove("hidden");
            activeName.textContent = "ER Unified Operating System";
            activeFile.textContent = "ศูนย์รวมระบบปฏิบัติการ ER";
            activeMark.className = "app-mark bg-blue";
            activeMark.textContent = "ER";
            openTab.classList.add("hidden");
            renderNav();
            renderHome();
            closeMobileMenu();
        }

        function openInNewTab(app) {
            const opened = window.open(appUrl(app.file), "_blank", "noopener");
            if (!opened) window.location.href = appUrl(app.file);
        }

        function renderNav() {
            sideNav.innerHTML = "";
            groups.forEach(group => {
                const groupBox = document.createElement("div");
                groupBox.className = "nav-group";

                const title = document.createElement("div");
                title.className = "nav-title";
                title.innerHTML = '<span class="nav-dot"></span><span>' + escapeHtml(group.name) + '</span>';
                groupBox.appendChild(title);

                group.apps.forEach(app => {
                    const button = document.createElement("button");
                    button.className = "nav-button" + (activeApp && activeApp.id === app.id ? " active" : "");
                    button.title = app.title;
                    button.innerHTML = [
                        '<span class="app-mark ' + app.color + '" style="width:32px;height:32px;font-size:11px;border-radius:8px;box-shadow:none;">' + escapeHtml(app.short) + '</span>',
                        '<span class="nav-label"><span class="nav-main">' + escapeHtml(app.title) + '</span><span class="nav-sub"><span class="status-dot"></span>' + escapeHtml(group.name) + '</span></span>'
                    ].join("");
                    button.addEventListener("click", () => openApp(app));
                    groupBox.appendChild(button);
                });

                sideNav.appendChild(groupBox);
            });
        }

        function appMatches(app, group) {
            const filterMatch = activeFilter === "ALL" || group.id === activeFilter;
            const haystack = [app.title, app.desc, app.file, group.name, group.subtitle, group.desc].join(" ").toLowerCase();
            const searchMatch = !searchQuery || haystack.includes(searchQuery.toLowerCase());
            return filterMatch && searchMatch;
        }

        function renderFilters() {
            const options = [{ id: "ALL", name: "ทั้งหมด" }, ...groups.map(group => ({ id: group.id, name: group.name }))];
            return options.map(option => (
                '<button class="segment ' + (activeFilter === option.id ? "active" : "") + '" data-filter="' + escapeHtml(option.id) + '">' + escapeHtml(option.name) + '</button>'
            )).join("");
        }

        function renderHome() {
            const visibleGroups = groups.map(group => ({
                ...group,
                apps: group.apps.filter(app => appMatches(app, group))
            })).filter(group => group.apps.length > 0);
            const visibleCount = visibleGroups.reduce((sum, group) => sum + group.apps.length, 0);
            const firstVisibleApp = visibleGroups[0] && visibleGroups[0].apps[0];

            home.innerHTML = [
                '<section class="hero">',
                    '<div class="hero-inner">',
                        '<div class="hero-main">',
                            '<span class="eyebrow"><span class="live-dot"></span>ER-UOS Command Portal</span>',
                            '<h1>ER Unified Operating System</h1>',
                            '<p class="hero-copy">ศูนย์รวมระบบปฏิบัติการ ER สำหรับเปิดใช้งานระบบ EMS, INHOS และ REFER จากหน้าเดียว พร้อมมุมมองที่ชัด ค้นหาเร็ว และเหมาะกับงานประจำเวร</p>',
                            '<div class="hero-actions">',
                                '<button class="primary-action" id="focusSearch">⌕ ค้นหาระบบ</button>',
                                '<button class="secondary-action" id="openFirstApp">' + (firstVisibleApp ? 'เปิดระบบแรก' : 'ไม่มีระบบที่ตรงเงื่อนไข') + '</button>',
                            '</div>',
                        '</div>',
                        '<div class="ops-panel" aria-label="ภาพรวมระบบ">',
                            '<div class="ops-head"><span>Operational Overview</span><span class="ops-code">LIVE</span></div>',
                            '<svg class="pulse-line" viewBox="0 0 360 72" fill="none" preserveAspectRatio="none" aria-hidden="true">',
                                '<path d="M0 39H52L66 39L78 15L95 62L112 29L126 39H175L188 39L201 24L220 50L238 39H360" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>',
                                '<path d="M0 39H52L66 39L78 15L95 62L112 29L126 39H175L188 39L201 24L220 50L238 39H360" stroke="#fff" stroke-opacity=".18" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></path>',
                            '</svg>',
                            '<div class="ops-list">',
                                groups.map(group => (
                                    '<div class="ops-line">' +
                                        '<span><strong>' + escapeHtml(group.name) + '</strong></span>' +
                                        '<span>' + group.apps.length + ' systems</span>' +
                                    '</div>'
                                )).join(""),
                            '</div>',
                        '</div>',
                    '</div>',
                '</section>',
                '<section class="content">',
                    '<div class="metric-grid">',
                        '<div class="metric-card" style="--metric-accent:#2563eb"><span><span class="metric-label">Total Systems</span><span class="metric-value">' + apps.length + '</span><span class="metric-hint">ระบบพร้อมใช้งาน</span></span><span class="module-count bg-blue">' + apps.length + '</span></div>',
                        '<div class="metric-card" style="--metric-accent:#057a67"><span><span class="metric-label">Workstreams</span><span class="metric-value">' + groups.length + '</span><span class="metric-hint">EMS / INHOS / REFER</span></span><span class="module-count bg-emerald">' + groups.length + '</span></div>',
                        '<div class="metric-card" style="--metric-accent:#d97706"><span><span class="metric-label">Local Mode</span><span class="metric-value">ON</span><span class="metric-hint">เปิดจากไฟล์ได้โดยตรง</span></span><span class="module-count bg-amber">OK</span></div>',
                        '<div class="metric-card" style="--metric-accent:#c81e3a"><span><span class="metric-label">View</span><span class="metric-value">' + visibleCount + '</span><span class="metric-hint">ผลลัพธ์ที่แสดง</span></span><span class="module-count bg-red">VR</span></div>',
                    '</div>',
                    '<div class="filter-row">',
                        '<div class="filter-title"><h2>ระบบปฏิบัติการ</h2><p>เลือกหมวดหรือค้นหาจากชื่อระบบ คำอธิบาย และชื่อไฟล์</p></div>',
                        '<div class="segmented">' + renderFilters() + '</div>',
                    '</div>',
                    '<div id="appGroups">' + renderGroups(visibleGroups) + '</div>',
                '</section>'
            ].join("");

            document.querySelectorAll(".segment").forEach(button => {
                button.addEventListener("click", () => {
                    activeFilter = button.dataset.filter;
                    renderHome();
                });
            });

            const focusSearch = document.getElementById("focusSearch");
            if (focusSearch) focusSearch.addEventListener("click", () => searchInput.focus());

            const openFirstApp = document.getElementById("openFirstApp");
            if (openFirstApp) openFirstApp.addEventListener("click", () => {
                if (firstVisibleApp) openApp(firstVisibleApp);
            });

            bindCardEvents();
        }

        function renderGroups(sourceGroups) {
            if (sourceGroups.length === 0) {
                return '<div class="empty-state">ไม่พบระบบที่ตรงกับคำค้นหา</div>';
            }

            return sourceGroups.map(group => (
                '<section class="group-section">' +
                    '<div class="group-heading">' +
                        '<div class="group-heading-main">' +
                            '<span class="group-mark ' + group.color + '">' + escapeHtml(group.short) + '</span>' +
                            '<div class="group-text">' +
                                '<h3>' + escapeHtml(group.name) + '</h3>' +
                                '<div class="subtitle">' + escapeHtml(group.subtitle) + '</div>' +
                                '<p class="group-desc">' + escapeHtml(group.desc) + '</p>' +
                            '</div>' +
                        '</div>' +
                        '<span class="badge">' + group.apps.length + ' ระบบ</span>' +
                    '</div>' +
                    '<div class="grid">' +
                        group.apps.map(app => renderAppCard(app, group)).join("") +
                    '</div>' +
                '</section>'
            )).join("");
        }

        function renderAppCard(app, group) {
            return [
                '<article class="app-card" role="button" tabindex="0" data-app-id="' + escapeHtml(app.id) + '" style="--card-accent:' + escapeHtml(app.accent) + '">',
                    '<div>',
                        '<span class="card-top">',
                            '<span class="app-mark ' + app.color + '">' + escapeHtml(app.short) + '</span>',
                            '<span class="open-mini" data-open-tab="' + escapeHtml(app.id) + '" title="เปิดในแท็บใหม่">↗</span>',
                        '</span>',
                        '<span class="group-pill"><span class="status-dot"></span>' + escapeHtml(group.name) + '</span>',
                        '<h4>' + escapeHtml(app.title) + '</h4>',
                        '<p>' + escapeHtml(app.desc) + '</p>',
                    '</div>',
                    '<span class="card-foot"><span>' + escapeHtml(app.file) + '</span><strong>เปิด ›</strong></span>',
                '</article>'
            ].join("");
        }

        function bindCardEvents() {
            document.querySelectorAll("[data-app-id]").forEach(card => {
                if (card.dataset.bound === "1") return;
                card.dataset.bound = "1";
                card.addEventListener("click", event => {
                    const tabTarget = event.target.closest("[data-open-tab]");
                    if (tabTarget) {
                        event.stopPropagation();
                        const app = appById.get(tabTarget.dataset.openTab);
                        if (app) openInNewTab(app);
                        return;
                    }
                    const app = appById.get(card.dataset.appId);
                    if (app) openApp(app);
                });
                card.addEventListener("keydown", event => {
                    if (event.key !== "Enter" && event.key !== " ") return;
                    event.preventDefault();
                    const app = appById.get(card.dataset.appId);
                    if (app) openApp(app);
                });
            });
        }

        function updateClock() {
            clock.textContent = new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        }

        function goHomeForSearch() {
            if (!activeApp) return;
            activeApp = null;
            frame.src = "about:blank";
            frame.classList.add("hidden");
            home.classList.remove("hidden");
            activeName.textContent = "ER Unified Operating System";
            activeFile.textContent = "ศูนย์รวมระบบปฏิบัติการ ER";
            activeMark.className = "app-mark bg-blue";
            activeMark.textContent = "ER";
            openTab.classList.add("hidden");
            renderNav();
        }

        document.getElementById("toggleSidebar").addEventListener("click", () => {
            if (window.innerWidth <= 820) {
                sidebar.classList.add("open");
                overlay.classList.add("show");
            } else {
                sidebar.classList.toggle("collapsed");
            }
        });

        document.getElementById("closeMobile").addEventListener("click", closeMobileMenu);
        overlay.addEventListener("click", closeMobileMenu);
        document.getElementById("homeButton").addEventListener("click", showHome);
        document.getElementById("homeButton").addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                showHome();
            }
        });

        searchInput.addEventListener("input", event => {
            searchQuery = event.target.value.trim();
            goHomeForSearch();
            renderHome();
        });

        searchInput.addEventListener("keydown", event => {
            if (event.key === "Escape") {
                searchQuery = "";
                searchInput.value = "";
                goHomeForSearch();
                renderHome();
            }
        });

        document.addEventListener("keydown", event => {
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
                event.preventDefault();
                searchInput.focus();
                searchInput.select();
            }
        });

        openTab.addEventListener("click", () => {
            if (activeApp) openInNewTab(activeApp);
        });

        document.getElementById("fullscreen").addEventListener("click", () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth > 820) closeMobileMenu();
        });

        setShellLabels();
        renderNav();
        showHome();
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
