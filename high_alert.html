          }
        ];

        function App() {
          const [selectedDrug, setSelectedDrug] = useState(null);
          
          const [patientInfo, setPatientInfo] = useState({
            name: '', age: '', weight: '', hn: '', an: '', ward: '', doctor: ''
          });

          const [records, setRecords] = useState([]);
          
          const [formInput, setFormInput] = useState({
            time: '', bp: '', hr: '', rr: '', spo2: '', symptoms: {}, recorder: ''
          });

          const handlePrint = () => {
            // โฟกัสที่หน้าต่างนี้ก่อนพิมพ์ และหน่วงเวลาเล็กน้อยเพื่อให้ระบบพร้อม
            window.focus();
            setTimeout(() => {
              window.print();
            }, 150);
          };

          const handleSelectDrug = (drug) => {
            setSelectedDrug(drug);
            setRecords([]); 
            setFormInput({ time: '', bp: '', hr: '', rr: '', spo2: '', symptoms: {}, recorder: formInput.recorder });
          };

          const handleBack = () => {
            setSelectedDrug(null);
          };

          const handlePatientChange = (e) => {
            setPatientInfo({...patientInfo, [e.target.name]: e.target.value});
          };

          const handleRecordChange = (e) => {
            setFormInput({...formInput, [e.target.name]: e.target.value});
          };

          const handleSymptomChange = (symptom) => {
            if (symptom === 'ไม่พบอาการผิดปกติ') {
              setFormInput({
                ...formInput,
                symptoms: formInput.symptoms['ไม่พบอาการผิดปกติ'] ? {} : { 'ไม่พบอาการผิดปกติ': true }
              });
            } else {
              setFormInput({
                ...formInput,
                symptoms: {
                  ...formInput.symptoms,
                  [symptom]: !formInput.symptoms[symptom],
                  'ไม่พบอาการผิดปกติ': false
                }
              });
            }
          };

          const addRecord = () => {
            if(!formInput.time) return alert('กรุณาระบุเวลาที่บันทึก (เช่น 10:15 หรือ 5 นาที)');
            
            const activeSymptoms = Object.keys(formInput.symptoms).filter(k => formInput.symptoms[k]);
            
            const newRecord = {
              ...formInput,
              symptomsList: activeSymptoms.length > 0 ? activeSymptoms.join(', ') : '-'
            };
            
            setRecords([...records, newRecord]);
            
            setFormInput({ time: '', bp: '', hr: '', rr: '', spo2: '', symptoms: {}, recorder: formInput.recorder });
          };

          const removeRecord = (index) => {
            const newRecords = [...records];
            newRecords.splice(index, 1);
            setRecords(newRecords);
          };

          if (!selectedDrug) {
            return (
              <div className="min-h-screen bg-gray-100 font-sans text-gray-800 p-4 md:p-8 flex flex-col">
                <div className="max-w-5xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden flex-grow w-full">
                  <div className="bg-red-700 text-white p-6 flex flex-col md:flex-row justify-between items-start md:items-center">
                    <div>
                      <h1 className="text-2xl md:text-3xl font-bold flex items-center gap-2">
                        <AlertTriangleIcon className="w-8 h-8" />
                        บัญชียาที่มีความเสี่ยงสูง (High Alert Drugs)
                      </h1>
                      <p className="mt-2 text-red-100 text-lg">โรงพยาบาลเสลภูมิ | เลือกรายการยาเพื่อเข้าสู่แบบฟอร์มการติดตาม</p>
                    </div>
                    <div className="mt-4 md:mt-0 bg-white/20 px-4 py-2 rounded-lg backdrop-blur-sm">
                      <span className="font-bold text-lg">จำนวน: 20 รายการ</span>
                    </div>
                  </div>

                  <div className="p-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {drugsData.map((drug) => (
                        <div 
                          key={drug.id} 
                          onClick={() => handleSelectDrug(drug)}
                          className={`cursor-pointer transition-all hover:shadow-md p-4 rounded-xl border-2 hover:-translate-y-1 ${drug.color}`}
                        >
                          <div className="flex justify-between items-start mb-2">
                            <h3 className="font-bold text-lg leading-tight">{drug.name}</h3>
                          </div>
                          <span className="inline-block px-2 py-1 bg-white/60 rounded text-xs font-semibold mb-3">
                            {drug.category}
                          </span>
                          <p className="text-sm line-clamp-3 opacity-90">
                            <span className="font-bold">⚠️ ข้อควรระวัง: </span>
                            {drug.warnings}
                          </p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="text-center mt-8 text-gray-500 font-medium">
                  นายทวี แสนสนอง develop
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-100 print:bg-white font-sans text-gray-800 p-4 md:p-8 print:p-0 flex flex-col">
              <div className="max-w-6xl mx-auto bg-white print:shadow-none shadow-xl rounded-xl overflow-hidden print:w-full print:max-w-none print:rounded-none flex-grow">
                
                <div className="print:hidden bg-gray-50 border-b p-4 flex justify-between items-center">
                  <button 
                    onClick={handleBack}
                    className="flex items-center gap-1 text-gray-600 hover:text-red-700 font-medium px-3 py-2 rounded-lg hover:bg-gray-200 transition"
                  >
                    <ChevronLeftIcon /> กลับหน้ารายการยา
                  </button>
                  <button 
                    onClick={handlePrint}
                    className="bg-red-700 text-white hover:bg-red-800 px-5 py-2 rounded-lg shadow font-medium flex items-center gap-2 transition"
                  >
                    <PrinterIcon /> พิมพ์แบบบันทึก (PDF)
                  </button>
                </div>

                <div className="p-6 md:p-8 print:p-2">
                  <div className="text-center mb-6 print:mb-3 border-b-2 border-black pb-4 print:pb-2 relative">
                    <h1 className="text-2xl print:text-xl font-bold uppercase mb-1">แบบติดตามการใช้ยาความเสี่ยงสูง (High Alert Drugs)</h1>
                    <h2 className="text-xl print:text-lg text-red-700 print:text-black font-bold flex items-center justify-center gap-2">
                      <ActivityIcon className="w-6 h-6 print:w-5 print:h-5" /> {selectedDrug.name}
                    </h2>
                    <p className="text-sm print:text-xs text-gray-500 print:text-black mt-2 print:mt-1">โรงพยาบาลเสลภูมิ จังหวัดร้อยเอ็ด</p>
                  </div>

                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 print:gap-2 mb-6 print:mb-3 print:grid-cols-4 border border-gray-300 print:border-black p-4 print:p-2 rounded-lg print:rounded-none">
                    <div className="col-span-2 md:col-span-2">
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">ชื่อ-สกุล ผู้ป่วย</label>
                      <input type="text" name="name" value={patientInfo.name} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="ระบุชื่อ-สกุล" />
                    </div>
                    <div>
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">อายุ (ปี)</label>
                      <input type="text" name="age" value={patientInfo.age} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="ระบุอายุ" />
                    </div>
                    <div>
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">น้ำหนัก (กก.)</label>
                      <input type="text" name="weight" value={patientInfo.weight} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="ระบุน้ำหนัก" />
                    </div>
                    <div>
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">HN</label>
                      <input type="text" name="hn" value={patientInfo.hn} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="รหัส HN" />
                    </div>
                    <div>
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">AN</label>
                      <input type="text" name="an" value={patientInfo.an} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="รหัส AN" />
                    </div>
                    <div>
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">หอผู้ป่วย/เตียง</label>
                      <input type="text" name="ward" value={patientInfo.ward} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="ระบุเตียง" />
                    </div>
                    <div>
                      <label className="block text-xs print:text-[10px] text-gray-500 font-bold uppercase">แพทย์ผู้สั่งใช้ยา</label>
                      <input type="text" name="doctor" value={patientInfo.doctor} onChange={handlePatientChange} className="w-full border-b border-gray-300 print:border-black focus:outline-none focus:border-red-500 py-1 print:py-0 print:text-xs" placeholder="ชื่อแพทย์" />
                    </div>
                  </div>

                  <div className="mb-6 print:mb-3 grid grid-cols-1 md:grid-cols-2 gap-4 print:gap-2">
                    <div className="bg-red-50 border border-red-200 print:border-black p-4 print:p-2 rounded-lg print:rounded-none">
                      <h3 className="font-bold text-red-800 print:text-black mb-2 print:mb-1 flex items-center gap-1 print:text-sm">
                        <AlertTriangleIcon className="w-4 h-4 print:w-3 print:h-3" /> ข้อควรระวังในการบริหารยา
                      </h3>
                      <p className="text-sm print:text-xs font-semibold leading-relaxed text-red-900 print:text-black">
                        {selectedDrug.warnings}
                      </p>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 print:border-black p-4 print:p-2 rounded-lg print:rounded-none">
                      <h3 className="font-bold text-blue-800 print:text-black mb-2 print:mb-1 flex items-center gap-1 print:text-sm">
                        <ClockIcon className="w-4 h-4 print:w-3 print:h-3" /> การเฝ้าระวังและการติดตาม
                      </h3>
                      <p className="text-sm print:text-xs font-semibold leading-relaxed text-blue-900 print:text-black">
                        {selectedDrug.monitorFreq}
                      </p>
                    </div>
                  </div>

                  <div className="mb-8 print:mb-2 overflow-x-auto">
                    <table className="min-w-full border-collapse border border-gray-400 print:border-black text-sm print:text-[11px]">
                      <thead className="bg-gray-100 print:bg-gray-200">
                        <tr>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 w-24 print:w-16">เวลา (Time)</th>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 w-24 print:w-16">BP<br/><span className="text-xs print:text-[9px] font-normal">(mmHg)</span></th>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 w-16">HR<br/><span className="text-xs print:text-[9px] font-normal">(/min)</span></th>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 w-16">RR<br/><span className="text-xs print:text-[9px] font-normal">(/min)</span></th>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 w-16">O2 Sat<br/><span className="text-xs print:text-[9px] font-normal">(%)</span></th>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1">อาการอันไม่พึงประสงค์ (Adverse Events)</th>
                          <th className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 w-24 print:w-20">ผู้บันทึก</th>
                          <th className="print:hidden border border-gray-400 py-2 px-3 w-12">ลบ</th>
                        </tr>
                      </thead>
                      <tbody>
                        {records.length === 0 ? (
                          <tr>
                            <td colSpan="8" className="border border-gray-400 print:border-black py-8 print:py-4 text-center text-gray-400 print:text-black italic">
                              -- ยังไม่มีข้อมูลการบันทึก (กรอกข้อมูลในฟอร์มด้านล่าง) --<br/>
                              <span className="print:inline hidden">หรือเว้นว่างไว้สำหรับจดบันทึกด้วยมือ</span>
                            </td>
                          </tr>
                        ) : (
                          records.map((rec, idx) => (
                            <tr key={idx} className="text-center">
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 font-semibold">{rec.time}</td>
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1">{rec.bp || '-'}</td>
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1">{rec.hr || '-'}</td>
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1">{rec.rr || '-'}</td>
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1">{rec.spo2 || '-'}</td>
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 text-left text-xs print:text-[10px] text-red-700 print:text-black">
                                {rec.symptomsList}
                              </td>
                              <td className="border border-gray-400 print:border-black py-2 px-3 print:py-1 print:px-1 text-sm print:text-[10px]">{rec.recorder || '-'}</td>
                              <td className="print:hidden border border-gray-400 py-2 px-3">
                                <button onClick={() => removeRecord(idx)} className="text-red-500 hover:text-red-700">
                                  <Trash2Icon />
                                </button>
                              </td>
                            </tr>
                          ))
                        )}
                        
                        {/* ปรับจำนวนบรรทัดว่างอัตโนมัติตามจำนวนที่มี เพื่อให้พอดีกับกระดาษ 1 หน้า (สูงสุดประมาณ 15 บรรทัด) */}
                        {[...Array(Math.max(0, 15 - records.length))].map((_, i) => (
                          <tr key={`empty-${i}`} className="hidden print:table-row h-10 print:h-6">
                            <td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td><td className="border border-black"></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  <div className="print:hidden bg-gray-50 border border-gray-200 p-5 rounded-lg">
                    <h3 className="font-bold mb-4 flex items-center gap-2">
                      <FileTextIcon /> บันทึกสัญญาณชีพและอาการ (V/S & Symptoms)
                    </h3>
                    
                    <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
                      <div className="col-span-2 md:col-span-1">
                        <label className="block text-xs font-semibold mb-1 text-red-700">เวลา (นาที/ชม.) *</label>
                        <input type="text" name="time" value={formInput.time} onChange={handleRecordChange} className="w-full border border-red-300 rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="เช่น 5 นาที, 10:30" />
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1">BP (mmHg)</label>
                        <input type="text" name="bp" value={formInput.bp} onChange={handleRecordChange} className="w-full border rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="120/80" />
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1">HR (/min)</label>
                        <input type="number" name="hr" value={formInput.hr} onChange={handleRecordChange} className="w-full border rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="80" />
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1">RR (/min)</label>
                        <input type="number" name="rr" value={formInput.rr} onChange={handleRecordChange} className="w-full border rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="20" />
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1">SpO2 (%)</label>
                        <input type="number" name="spo2" value={formInput.spo2} onChange={handleRecordChange} className="w-full border rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="98" />
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1 text-blue-700">ผู้บันทึก</label>
                        <input type="text" name="recorder" value={formInput.recorder} onChange={handleRecordChange} className="w-full border border-blue-300 rounded p-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="ชื่อพยาบาล" />
                      </div>
                    </div>

                    <div className="mb-4">
                      <label className="block text-xs font-bold text-red-700 mb-2">อาการที่ต้องเฝ้าระวัง (ติ๊กอาการที่พบ):</label>
                      <div className="flex flex-wrap gap-3">
                        <label className="flex items-center gap-2 bg-green-50 border border-green-300 px-3 py-2 rounded shadow-sm cursor-pointer hover:bg-green-100 text-sm">
                          <input 
                            type="checkbox" 
                            checked={!!formInput.symptoms['ไม่พบอาการผิดปกติ']}
                            onChange={() => handleSymptomChange('ไม่พบอาการผิดปกติ')}
                            className="w-4 h-4 text-green-600 rounded focus:ring-green-500"
                          />
                          <span className="text-green-800 font-bold">ไม่พบอาการผิดปกติ</span>
                        </label>
                        {selectedDrug.symptomsToWatch.map((symp, i) => (
                          <label key={i} className="flex items-center gap-2 bg-white border px-3 py-2 rounded shadow-sm cursor-pointer hover:bg-red-50 text-sm">
                            <input 
                              type="checkbox" 
                              checked={!!formInput.symptoms[symp]}
                              onChange={() => handleSymptomChange(symp)}
                              className="w-4 h-4 text-red-600 rounded focus:ring-red-500"
                            />
                            {symp}
                          </label>
                        ))}
                      </div>
                    </div>

                    <button onClick={addRecord} className="w-full md:w-auto bg-gray-800 text-white px-6 py-2 rounded shadow flex items-center justify-center gap-2 hover:bg-black transition">
                      <PlusIcon /> เพิ่มข้อมูลลงตาราง
                    </button>
                  </div>

                  <div className="hidden print:flex justify-end mt-4 print:mt-2 relative">
                    <div className="text-center w-48 print:w-40">
                      <p className="border-b border-black mb-1 pb-4 print:pb-3"></p>
                      <p className="text-sm print:text-[10px]">( พยาบาลผู้ดูแล / ผู้ประเมิน )</p>
                      <p className="text-sm print:text-[10px] mt-1">วันที่ _______/_______/_______</p>
                    </div>
                  </div>

                </div>
              </div>

              <div className="print:hidden text-center mt-6 mb-2 text-gray-500 font-medium">
                นายทวี แสนสนอง develop
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        (function runAppSource() {
            const source = document.getElementById('app-source');
            const root = document.getElementById('root');
            const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]);
            const showError = (error) => {
                console.error(error);
                root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Segoe UI,Tahoma,sans-serif;background:#f8fafc;color:#0f172a;"><div style="max-width:620px;background:#fff;border:1px solid #fecdd3;border-radius:16px;padding:24px;box-shadow:0 18px 42px rgba(15,23,42,.12);"><div style="font-size:13px;font-weight:800;color:#e11d48;text-transform:uppercase;letter-spacing:.08em;">Script Error</div><h1 style="margin:10px 0 8px;font-size:22px;">เปิดระบบไม่สำเร็จ</h1><p style="margin:0;color:#64748b;line-height:1.7;">' + escapeHtml(error && error.message ? error.message : error) + '</p></div></div>';
            };
            try {
                if (!window.React || !window.ReactDOM || !window.Babel) throw new Error('โหลด React / ReactDOM / Babel ไม่สำเร็จ');
                (0, eval)(Babel.transform(source.textContent, { presets: ['env'], plugins: [['transform-react-jsx', { runtime: 'classic' }]] }).code);
            } catch (error) {
                showError(error);
            }
        })();
    </script>
</body>
</html>
