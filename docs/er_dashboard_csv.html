<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Dashboard รพ.เสลภูมิ</title>
    
    <!-- Tailwind CSS -->
    <script src="vendor/tailwindcss.js"></script>
    
    <!-- React & ReactDOM (Locked to 18.2.0) -->
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="vendor/babel.min.js"></script>
    
    <!-- Recharts Dependencies -->
    <script src="vendor/prop-types.min.js"></script>
    <script src="vendor/react-is.production.min.js"></script>
    <script src="vendor/Recharts.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="vendor/phosphor-icons.js"></script>

    <!-- Export PDF -->
    <script src="vendor/html2canvas.min.js"></script>
    <script src="vendor/jspdf.umd.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #dashboard-content { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Prompt','Segoe UI',Tahoma,sans-serif;background:#f7fee7;color:#0f172a;">
            <div style="max-width:520px;width:100%;background:#fff;border:1px solid #d9f99d;border-radius:16px;padding:24px;box-shadow:0 18px 42px rgba(101,163,13,.14);">
                <div style="font-size:13px;font-weight:800;color:#65a30d;letter-spacing:.08em;text-transform:uppercase;">Loading ER Dashboard CSV</div>
                <h1 style="margin:10px 0 8px;font-size:24px;line-height:1.25;">กำลังเปิด Dashboard CSV</h1>
                <p style="margin:0;color:#64748b;line-height:1.7;">หากหน้านี้ไม่เปลี่ยนเป็นระบบหลัก แสดงว่า React/Babel หรือไฟล์จาก CDN ยังโหลดไม่สำเร็จ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วรีเฟรช หรือเปิดไฟล์นี้ในแท็บใหม่</p>
            </div>
        </div>
    </div>

    <script type="text/plain" id="app-source">
        /** @jsxRuntime classic */
        const { useState, useMemo, useRef } = React;
        const { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer,
          PieChart, Pie, Cell, LineChart, Line, ReferenceLine
        } = window.Recharts;

        // ไอคอนต่างๆ
        const Activity = ({size=24, className=''}) => <i className={`ph-bold ph-activity ${className}`}></i>;
        const Users = ({size=24, className=''}) => <i className={`ph-bold ph-users ${className}`}></i>;
        const Ambulance = ({size=24, className=''}) => <i className={`ph-bold ph-ambulance ${className}`}></i>;
        const AlertCircle = ({size=24, className=''}) => <i className={`ph-bold ph-warning-circle ${className}`}></i>;
        const HeartPulse = ({size=24, className=''}) => <i className={`ph-bold ph-heartbeat ${className}`}></i>;
        const Calendar = ({size=24, className=''}) => <i className={`ph-bold ph-calendar-blank ${className}`}></i>;
        const Clock = ({size=24, className=''}) => <i className={`ph-bold ph-clock ${className}`}></i>;
        const FileText = ({size=24, className=''}) => <i className={`ph-bold ph-file-text ${className}`}></i>;
        const ChevronDown = ({size=24, className=''}) => <i className={`ph-bold ph-caret-down ${className}`}></i>;
        const Upload = ({size=24, className=''}) => <i className={`ph-bold ph-upload-simple ${className}`}></i>;
        const FileSpreadsheet = ({size=24, className=''}) => <i className={`ph-bold ph-file-csv ${className}`}></i>;
        const RotateCcw = ({size=24, className=''}) => <i className={`ph-bold ph-arrow-counter-clockwise ${className}`}></i>;
        const AlertTriangle = ({size=24, className=''}) => <i className={`ph-bold ph-warning ${className}`}></i>;
        const Brain = ({size=24, className=''}) => <i className={`ph-bold ph-brain ${className}`}></i>;
        const Car = ({size=24, className=''}) => <i className={`ph-bold ph-car ${className}`}></i>;
        const Siren = ({size=24, className=''}) => <i className={`ph-bold ph-siren ${className}`}></i>;
        const Stethoscope = ({size=24, className=''}) => <i className={`ph-bold ph-stethoscope ${className}`}></i>;
        const DownloadSimple = ({size=24, className=''}) => <i className={`ph-bold ph-download-simple ${className}`}></i>;
        const UserList = ({size=24, className=''}) => <i className={`ph-bold ph-user-list ${className}`}></i>;
        const Trash = ({size=24, className=''}) => <i className={`ph-bold ph-trash ${className}`}></i>;
        const Plus = ({size=24, className=''}) => <i className={`ph-bold ph-plus ${className}`}></i>;

        // ชุดสี ER
        const COLORS = {
          resus: '#ef4444', emer: '#f97316', urg: '#eab308', lessUrg: '#22c55e', nonUrg: '#94a3b8',
          dc: '#10b981', admit: '#3b82f6', refer: '#8b5cf6', dw: '#6366f1', against: '#f59e0b', dead: '#334155',
          stroke: '#4f46e5', stemi: '#ec4899', sepsis: '#e11d48', severeHi: '#c026d3', fastPed: '#059669',
          traff: '#ea580c', general: '#ca8a04', ems: '#06b6d4', police: '#b45309', autopsy: '#475569',
          ett: '#dc2626', hfnc: '#2563eb', ct: '#0891b2', pui: '#be123c'
        };

        const normalize = (str) => String(str).replace(/[^ก-๙a-zA-Z0-9]/g, '').toLowerCase();

        const getNumSafe = (obj, keywords) => {
          const keys = Object.keys(obj);
          const normKeywords = keywords.map(normalize);
          
          for (const key of keys) {
            const normKey = normalize(key);
            if (normKeywords.includes(normKey)) {
              const val = parseInt(obj[key], 10);
              return isNaN(val) ? 0 : val;
            }
          }
          for (const key of keys) {
            const normKey = normalize(key);
            if (normKeywords.some(kw => normKey.includes(kw))) {
               const val = parseInt(obj[key], 10);
               return isNaN(val) ? 0 : val;
            }
          }
          return 0;
        };

        const safeGetDate = (obj) => {
          const keys = Object.keys(obj);
          const target = ['วดป', 'วันเดือนปี', 'วันที่', 'date'];
          for (const key of keys) {
            if (target.some(t => normalize(key).includes(t))) return obj[key];
          }
          return '';
        };

        const safeGetShift = (obj) => {
          const keys = Object.keys(obj);
          for (const key of keys) {
            if (normalize(key) === 'เวร' || normalize(key) === 'shift') return String(obj[key]).trim();
          }
          return '';
        };

        const safeGetString = (obj, keywords) => {
          const keys = Object.keys(obj);
          const normKeywords = keywords.map(normalize);
          for (const key of keys) {
            if (normKeywords.some(kw => normalize(key).includes(kw))) return obj[key] || '';
          }
          return '';
        };

        const parseUniversalDate = (raw) => {
            if (!raw) return null;
            let d = String(raw).split(' ')[0].trim();
            if (d.includes('-')) {
                const parts = d.split('-');
                if(parts.length===3) return { y: parseInt(parts[0],10), m: parseInt(parts[1],10), d: parseInt(parts[2],10) };
            } else if (d.includes('/')) {
                const parts = d.split('/');
                if(parts.length===3) {
                    if (parts[0].length === 4) return { y: parseInt(parts[0],10), m: parseInt(parts[1],10), d: parseInt(parts[2],10) };
                    let month = parseInt(parts[1], 10);
                    let day = parseInt(parts[0], 10);
                    if (month > 12) { month = parseInt(parts[0], 10); day = parseInt(parts[1], 10); } 
                    return { y: parseInt(parts[2],10), m: month, d: day };
                }
            }
            return null;
        }

        function ErDashboard() {
          const [rawData, setRawData] = useState([]);
          const [selectedMonth, setSelectedMonth] = useState('All');
          const [selectedShift, setSelectedShift] = useState('All'); 
          const [isExporting, setIsExporting] = useState(false);
          const fileInputRef = useRef(null);
          
          // State สำหรับ Custom Modals
          const [showClearConfirm, setShowClearConfirm] = useState(false);
          const [errorMessage, setErrorMessage] = useState('');

          const formatDate = (dateStr) => {
            const parsed = parseUniversalDate(dateStr);
            if (!parsed) return dateStr;
            return `${parsed.d.toString().padStart(2,'0')}/${parsed.m.toString().padStart(2,'0')}/${parsed.y}`;
          };

          const getMonthYear = (dateStr) => {
            const parsed = parseUniversalDate(dateStr);
            if (!parsed) return '';
            return `${parsed.m}/${parsed.y}`;
          };

          const parseDateForSort = (dateStr) => {
            const parsed = parseUniversalDate(dateStr);
            if (!parsed) return 0;
            return new Date(parsed.y, parsed.m - 1, parsed.d).getTime();
          };

          const isProblem = (text) => {
            if (!text) return false;
            const t = String(text).trim();
            if (t === '') return false;
            const ignore = ['ไม่มี', '-', '_', '0', '.', 'ไม่มี.', 'ไม่มี_', '..'];
            if (ignore.includes(t)) return false;
            return true;
          };

          const handleExportPDF = async () => {
            setIsExporting(true);
            const element = document.getElementById('dashboard-content');
            if (!element) { setIsExporting(false); return; }
            try {
              const problemTable = document.getElementById('problem-table-container');
              const originalMaxHeight = problemTable.style.maxHeight;
              const originalOverflow = problemTable.style.overflow;
              problemTable.style.maxHeight = 'none';
              problemTable.style.overflow = 'visible';

              const canvas = await html2canvas(element, { scale: 1.5, useCORS: true, backgroundColor: '#f8fafc' });
              const imgData = canvas.toDataURL('image/png');
              const pdf = new window.jspdf.jsPDF({
                orientation: canvas.width > canvas.height ? 'l' : 'p',
                unit: 'px',
                format: [canvas.width, canvas.height]
              });
              
              pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
              pdf.save(`ER_Dashboard_${selectedMonth === 'All' ? 'Total' : selectedMonth.replace('/','-')}_${selectedShift}.pdf`);

              problemTable.style.maxHeight = originalMaxHeight;
              problemTable.style.overflow = originalOverflow;
            } catch (error) {
              console.error('Error generating PDF', error);
              setErrorMessage('เกิดข้อผิดพลาดในการสร้างไฟล์ PDF');
            } finally {
              setIsExporting(false);
            }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
              const buffer = evt.target.result;
              let text = '';
              try {
                text = new TextDecoder('utf-8', { fatal: true }).decode(buffer);
              } catch (err) {
                text = new TextDecoder('windows-874').decode(buffer);
              }
              if (!/[\u0E00-\u0E7F]/.test(text)) {
                 const altText = new TextDecoder('windows-874').decode(buffer);
                 if (/[\u0E00-\u0E7F]/.test(altText)) text = altText;
              }
              const parsed = parseCSV(text);
              if (parsed && parsed.length > 0) {
                setRawData(prevData => {
                  const dataMap = new Map();
                  
                  const makeUniqueKey = (row) => {
                    const d = safeGetDate(row);
                    const s = safeGetShift(row);
                    const parsedDate = parseUniversalDate(d);
                    const dateStr = parsedDate ? `${parsedDate.y}-${parsedDate.m}-${parsedDate.d}` : String(d).trim();
                    return `${dateStr}_${String(s).trim()}`.toLowerCase();
                  };

                  prevData.forEach(row => {
                    dataMap.set(makeUniqueKey(row), row);
                  });

                  parsed.forEach(row => {
                    if (safeGetDate(row) && safeGetShift(row)) {
                       dataMap.set(makeUniqueKey(row), row);
                    }
                  });

                  return Array.from(dataMap.values());
                });

                setSelectedMonth('All');
                setSelectedShift('All');
              } else {
                setErrorMessage('ไม่พบข้อมูล หรือรูปแบบไฟล์ไม่ถูกต้อง กรุณาตรวจสอบว่าเป็นไฟล์ CSV/TSV');
              }
              if (fileInputRef.current) fileInputRef.current.value = '';
            };
            reader.readAsArrayBuffer(file);
          };

          const handleClearData = () => {
            setShowClearConfirm(true);
          };

          const confirmClearData = () => {
             setRawData([]);
             setSelectedMonth('All');
             setSelectedShift('All');
             setShowClearConfirm(false);
          };

          const parseCSV = (text) => {
            const lines = text.split(/\r\n|\r|\n/).filter(line => line.replace(/,/g, '').trim() !== '');
            if (lines.length < 2) return [];

            const delimiter = lines[0].indexOf('\t') !== -1 ? '\t' : ',';
            const parseLine = (line) => {
              let result = [], curVal = '', inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (inQuotes) {
                  if (char === '"') {
                    if (i + 1 < line.length && line[i+1] === '"') { curVal += '"'; i++; } 
                    else { inQuotes = false; }
                  } else { curVal += char; }
                } else {
                  if (char === '"') { inQuotes = true; } 
                  else if (char === delimiter) { result.push(curVal); curVal = ''; } 
                  else { curVal += char; }
                }
              }
              result.push(curVal);
              return result.map(v => v.trim());
            };

            const rawHeaders = parseLine(lines[0]);
            const headers = rawHeaders.map(h => h.replace(/^\uFEFF/, '').trim());

            return lines.slice(1).map(line => {
              const values = parseLine(line);
              const obj = {};
              headers.forEach((header, i) => { if (header) obj[header] = values[i] || ''; });
              return obj;
            });
          };

          const availableMonths = useMemo(() => {
            if (rawData.length === 0) return ['All'];
            const months = new Set(
              rawData.map(d => getMonthYear(safeGetDate(d))).filter(m => m !== '')
            );
            return ['All', ...Array.from(months)];
          }, [rawData]);

          const filteredData = useMemo(() => {
            let data = rawData;
            if (selectedMonth !== 'All') data = data.filter(d => getMonthYear(safeGetDate(d)) === selectedMonth);
            if (selectedShift !== 'All') data = data.filter(d => safeGetShift(d).includes(selectedShift));
            return data;
          }, [rawData, selectedMonth, selectedShift]);

          const kpis = useMemo(() => {
            return filteredData.reduce((acc, curr) => {
              const shift = safeGetShift(curr);
              
              acc.total += getNumSafe(curr, ['ยอดผู้ป่วยรวม', 'ยอดรวม', 'total']);
              acc.admit += getNumSafe(curr, ['admit', 'แอดมิท']);
              acc.refer += getNumSafe(curr, ['refer', 'รีเฟอร์']);
              acc.dead += getNumSafe(curr, ['dead', 'ตาย']); 
              acc.cpr += getNumSafe(curr, ['cprสำเร็จ']) + getNumSafe(curr, ['cprเสียชีวิต']);
              acc.revisit += getNumSafe(curr, ['casererevisit', 'rerevisit', 'revisit']);
              acc.ems += getNumSafe(curr, ['ออกเหตุ', 'ems']);
              
              acc.resus += getNumSafe(curr, ['resuscitation', 'resucitation']);
              acc.emer += getNumSafe(curr, ['emergency']);
              acc.urg += getNumSafe(curr, ['urgent']);
              acc.lessUrg += getNumSafe(curr, ['lessurgent']);
              acc.nonUrg += getNumSafe(curr, ['nonurgent']);
              
              acc.dc += getNumSafe(curr, ['จำหน่าย', 'd/c', 'dc']);
              acc.dw += getNumSafe(curr, ['d/w', 'dw', 'ล้างแผล']); 
              acc.againstAdvice += getNumSafe(curr, ['ไม่สมัครใจรักษา', 'ไม่สมัครใจ']);
              
              acc.stroke += getNumSafe(curr, ['stroke']);
              acc.stemi += getNumSafe(curr, ['stemi']);
              acc.sepsis += getNumSafe(curr, ['sepsis']);
              acc.severeHi += getNumSafe(curr, ['severehi']);
              acc.fastPed += getNumSafe(curr, ['fastเด็ก', 'fastped']);
              
              acc.traff += getNumSafe(curr, ['อุบัติเหตุจราจร', 'จราจร']);
              acc.generalTraff += getNumSafe(curr, ['อุบัติเหตุทั่วไป', 'ทั่วไป']);
              acc.police += getNumSafe(curr, ['คดี']);
              acc.autopsy += getNumSafe(curr, ['ชันสูตร']);

              acc.ett += getNumSafe(curr, ['onett', 'ett']);
              acc.hfnc += getNumSafe(curr, ['onhfnc', 'hfnc']);
              acc.ct += getNumSafe(curr, ['ct']);
              acc.pui += getNumSafe(curr, ['pui']);

              const psychoVal = getNumSafe(curr, ['จิตเวชฉุกเฉิน', 'จิตเวช', 'ผู้ป่วยจิตเวช']); 
              const traumaVal = getNumSafe(curr, ['อุบัติเหตุจราจร', 'จราจร']) + getNumSafe(curr, ['อุบัติเหตุทั่วไป', 'ทั่วไป']);
              const criticalVal = getNumSafe(curr, ['resuscitation', 'resucitation']) + getNumSafe(curr, ['emergency']);

              acc.psycho.total += psychoVal;
              acc.trauma.total += traumaVal;
              acc.critical.total += criticalVal;

              if (shift.includes('เช้า')) {
                acc.psycho.morning += psychoVal; acc.trauma.morning += traumaVal; acc.critical.morning += criticalVal;
              } else if (shift.includes('บ่าย')) {
                acc.psycho.afternoon += psychoVal; acc.trauma.afternoon += traumaVal; acc.critical.afternoon += criticalVal;
              } else if (shift.includes('ดึก')) {
                acc.psycho.night += psychoVal; acc.trauma.night += traumaVal; acc.critical.night += criticalVal;
              }

              return acc;
            }, { 
              total: 0, admit: 0, refer: 0, dead: 0, cpr: 0, revisit: 0, ems: 0, 
              resus: 0, emer: 0, urg: 0, lessUrg: 0, nonUrg: 0, dc: 0, dw: 0, againstAdvice: 0,
              stroke: 0, stemi: 0, sepsis: 0, severeHi: 0, fastPed: 0, traff: 0, generalTraff: 0, police: 0, autopsy: 0,
              ett: 0, hfnc: 0, ct: 0, pui: 0,
              psycho: { total: 0, morning: 0, afternoon: 0, night: 0 },
              trauma: { total: 0, morning: 0, afternoon: 0, night: 0 },
              critical: { total: 0, morning: 0, afternoon: 0, night: 0 },
            });
          }, [filteredData]);

          const leaderData = useMemo(() => {
            const leaders = {};
            filteredData.forEach(d => {
              let leaderName = safeGetString(d, ['incharge', 'หัวหน้าเวร']);
              if (leaderName && leaderName.trim() !== '') {
                leaderName = leaderName.trim();
                if (!leaders[leaderName]) leaders[leaderName] = 0;
                leaders[leaderName] += getNumSafe(d, ['ยอดผู้ป่วยรวม', 'ยอดรวม', 'total']);
              }
            });

            return Object.entries(leaders)
              .map(([name, value]) => ({ name, value }))
              .sort((a, b) => b.value - a.value)
              .slice(0, 10); 
          }, [filteredData]);

          const triageData = [
            { name: 'Resuscitation', value: kpis.resus, color: COLORS.resus },
            { name: 'Emergency', value: kpis.emer, color: COLORS.emer },
            { name: 'Urgent', value: kpis.urg, color: COLORS.urg },
            { name: 'Less Urgent', value: kpis.lessUrg, color: COLORS.lessUrg },
            { name: 'Non Urgent', value: kpis.nonUrg, color: COLORS.nonUrg },
          ].filter(d => d.value > 0);

          const dispositionData = [
            { name: 'D/C (กลับบ้าน)', value: kpis.dc, fill: COLORS.dc },
            { name: 'Admit', value: kpis.admit, fill: COLORS.admit },
            { name: 'Refer', value: kpis.refer, fill: COLORS.refer },
            { name: 'D/W (ล้างแผล)', value: kpis.dw, fill: COLORS.dw },
            { name: 'ไม่สมัครใจ', value: kpis.againstAdvice, fill: COLORS.against },
            { name: 'เสียชีวิต', value: kpis.dead, fill: COLORS.dead },
          ];

          const shiftData = useMemo(() => {
            const shifts = { 'เช้า': 0, 'บ่าย': 0, 'ดึก': 0 };
            filteredData.forEach(d => {
              const shift = safeGetShift(d);
              if (shift.includes('เช้า')) shifts['เช้า'] += getNumSafe(d, ['ยอดผู้ป่วยรวม', 'ยอดรวม', 'total']);
              else if (shift.includes('บ่าย')) shifts['บ่าย'] += getNumSafe(d, ['ยอดผู้ป่วยรวม', 'ยอดรวม', 'total']);
              else if (shift.includes('ดึก')) shifts['ดึก'] += getNumSafe(d, ['ยอดผู้ป่วยรวม', 'ยอดรวม', 'total']);
            });
            return [
              { name: 'เวรเช้า', value: shifts['เช้า'], fill: '#f59e0b' },   
              { name: 'เวรบ่าย', value: shifts['บ่าย'], fill: '#3b82f6' },   
              { name: 'เวรดึก', value: shifts['ดึก'], fill: '#4f46e5' },     
            ];
          }, [filteredData]);

          const criticalData = [
            { name: 'Stroke FT', value: kpis.stroke, fill: COLORS.stroke },
            { name: 'STEMI', value: kpis.stemi, fill: COLORS.stemi },
            { name: 'Sepsis', value: kpis.sepsis, fill: COLORS.sepsis },
            { name: 'Severe HI', value: kpis.severeHi, fill: COLORS.severeHi },
            { name: 'Fast เด็ก', value: kpis.fastPed, fill: COLORS.fastPed },
          ];

          const traumaData = [
            { name: 'จราจร', value: kpis.traff, fill: COLORS.traff },
            { name: 'ทั่วไป', value: kpis.generalTraff, fill: COLORS.general },
            { name: 'ออกเหตุ', value: kpis.ems, fill: COLORS.ems },
            { name: 'คดี', value: kpis.police, fill: COLORS.police },
            { name: 'ชันสูตร', value: kpis.autopsy, fill: COLORS.autopsy },
          ];

          const procedureData = [
            { name: 'On ETT', value: kpis.ett, fill: COLORS.ett },
            { name: 'HFNC', value: kpis.hfnc, fill: COLORS.hfnc },
            { name: 'CT Scan', value: kpis.ct, fill: COLORS.ct },
            { name: 'PUI', value: kpis.pui, fill: COLORS.pui },
          ];

          const trendData = useMemo(() => {
            if (selectedMonth === 'All') {
              const monthly = {};
              filteredData.forEach(d => {
                const rawDate = safeGetDate(d);
                if(!rawDate || rawDate.replace(/,/g, '').trim() === '') return;
                const monthYear = getMonthYear(rawDate);
                if (!monthly[monthYear]) {
                  monthly[monthYear] = { monthYear, total: 0, days: new Set(), sortDate: rawDate };
                }
                monthly[monthYear].total += getNumSafe(d, ['ยอดผู้ป่วยรวม', 'ยอดรวม', 'total']);

                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 className="text-base font-bold mb-4 flex items-center gap-2 text-slate-800">
                      <Stethoscope size={18} className="text-cyan-500" /> หัตถการและการคัดกรองพิเศษ
                    </h2>
                    <div className="h-56">
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={procedureData} margin={{ top: 20, right: 0, left: -20, bottom: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                          <XAxis dataKey="name" {...chartProps} />
                          <YAxis {...chartProps} />
                          <RechartsTooltip 
                            cursor={{fill: '#f1f5f9'}} 
                            formatter={(value) => [`${value} ราย`, 'จำนวน']}
                            contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}
                          />
                          <Bar dataKey="value" radius={[8, 8, 0, 0]} barSize={28}>
                            {procedureData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.fill} />)}
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                </div>

                {/* Row 3: Daily Trend Line Chart */}
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
                  <h2 className="text-base font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <Calendar size={18} className="text-blue-600" /> 
                    {selectedMonth === 'All' && selectedShift === 'All' ? 'แนวโน้มค่าเฉลี่ยผู้ป่วยต่อวัน (รายเดือน)' : 'แนวโน้มผู้ป่วยรายวัน'}
                  </h2>
                  <div className="h-72">
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={trendData} margin={{ top: 20, right: 20, left: -20, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                        <XAxis dataKey="label" {...chartProps} minTickGap={10}/>
                        <YAxis {...chartProps} />
                        <RechartsTooltip 
                          contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)', color: '#1e293b', fontWeight: 'bold' }} 
                          formatter={(value, name, props) => [`${value} ราย`, props.payload.tooltipName]}
                        />
                        <ReferenceLine 
                          y={averageValue} 
                          stroke="#ef4444" 
                          strokeDasharray="3 3" 
                          label={{ position: 'top', value: `เฉลี่ย: ${averageValue}`, fill: '#ef4444', fontSize: 13, fontWeight: 'bold' }} 
                        />
                        <Line 
                          type="monotone" 
                          dataKey="value" 
                          name="จำนวน" 
                          stroke="#3b82f6" 
                          strokeWidth={3} 
                          dot={{ r: 4, strokeWidth: 0, fill: '#3b82f6' }} 
                          activeDot={{ r: 6, stroke: '#fff', strokeWidth: 2 }} 
                        />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                {/* Row 4: Problem Tracker Table */}
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden" id="problem-table-container">
                  <div className="p-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h2 className="text-base font-bold flex items-center gap-2 text-slate-800">
                      <AlertTriangle size={18} className="text-red-500" /> ติดตามปัญหาและเหตุการณ์ในเวร
                    </h2>
                    <span className="bg-red-500 text-white text-[11px] font-bold px-3 py-1 rounded-full shadow-sm">
                      {problemsList.length} รายการ
                    </span>
                  </div>
                  <div className="overflow-x-auto max-h-96 overflow-y-auto custom-scrollbar">
                    {problemsList.length > 0 ? (
                      <table className="w-full text-sm text-left">
                        <thead className="text-[11px] font-bold text-slate-500 uppercase bg-white sticky top-0 border-b border-slate-200 z-10">
                          <tr>
                            <th className="px-6 py-4 w-32 tracking-wider">วันที่</th>
                            <th className="px-6 py-4 w-24 tracking-wider">เวร</th>
                            <th className="px-6 py-4 w-48 tracking-wider">หัวหน้าเวร</th>
                            <th className="px-6 py-4 tracking-wider">รายละเอียดปัญหา</th>
                          </tr>
                        </thead>
                        <tbody>
                          {problemsList.map((row, index) => (
                            <tr key={index} className="bg-white border-b border-slate-100 hover:bg-slate-50 transition-colors">
                              <td className="px-6 py-4 text-slate-600 font-bold">{row.date}</td>
                              <td className="px-6 py-4">
                                <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold
                                  ${row.shift.includes('เช้า') ? 'bg-amber-100 text-amber-700' : 
                                    row.shift.includes('บ่าย') ? 'bg-blue-100 text-blue-700' : 
                                    'bg-indigo-100 text-indigo-700'}`}>
                                  {row.shift}
                               </span>
                              </td>
                              <td className="px-6 py-4 font-bold text-slate-700">{row.leader}</td>
                              <td className="px-6 py-4 text-slate-600 font-medium leading-relaxed">{row.problem}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    ) : (
                       <div className="p-12 text-center flex flex-col items-center">
                         <div className="bg-slate-100 p-4 rounded-full mb-4">
                           <AlertTriangle size={28} className="text-slate-400"/>
                         </div>
                         <p className="text-slate-500 font-bold">ไม่มีบันทึกปัญหาในช่วงเวลาที่เลือก</p>
                       </div>
                    )}
                  </div>
                </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErDashboard />);
    </script>
    <script>
        (function runAppSource() {
            const source = document.getElementById('app-source');
            const root = document.getElementById('root');
            const showError = (error) => {
                console.error(error);
                root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Segoe UI,Tahoma,sans-serif;background:#f8fafc;color:#0f172a;"><div style="max-width:620px;background:#fff;border:1px solid #fecdd3;border-radius:16px;padding:24px;box-shadow:0 18px 42px rgba(15,23,42,.12);"><div style="font-size:13px;font-weight:800;color:#e11d48;text-transform:uppercase;letter-spacing:.08em;">Script Error</div><h1 style="margin:10px 0 8px;font-size:22px;">เปิด Dashboard CSV ไม่สำเร็จ</h1><p style="margin:0 0 12px;color:#64748b;line-height:1.7;">' + String(error && error.message ? error.message : error).replace(/[&<>"']/g, function (char) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]; }) + '</p></div></div>';
            };
            try {
                if (!window.React || !window.ReactDOM || !window.Babel) {
                    throw new Error('โหลด React / ReactDOM / Babel ไม่สำเร็จ');
                }
                const compiled = Babel.transform(source.textContent, {
                    presets: ['env'],
                    plugins: [['transform-react-jsx', { runtime: 'classic' }]]
                }).code;
                (0, eval)(compiled);
            } catch (error) {
                showError(error);
            }
        })();
    </script>
</body>
</html>
