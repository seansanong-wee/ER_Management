<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital X-ray Sync (Red/Black 3D Theme)</title>
    
    <!-- Libraries -->
    <script src="vendor/tailwindcss.js"></script>
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <script src="vendor/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #09090b; /* Zinc 950 */
            color: #e4e4e7; /* Zinc 200 */
            -webkit-tap-highlight-color: transparent; 
            background-image: radial-gradient(circle at 50% 0%, #2a0a0a 0%, #09090b 70%);
            min-height: 100vh;
        }

        /* 3D Glass Effect */
        .glass-panel {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .glass-panel-light {
            background: rgba(39, 39, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Neon Glow */
        .glow-red { box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .glow-blue { box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        
        /* 3D Button */
        .btn-3d-red {
            background: linear-gradient(145deg, #b91c1c, #991b1b);
            border-top: 1px solid #ef4444;
            box-shadow: 0 4px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        .btn-3d-red:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7f1d1d, inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-3d-zinc {
            background: linear-gradient(145deg, #3f3f46, #27272a);
            border-top: 1px solid #52525b;
            box-shadow: 0 4px 0 #18181b, 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        .btn-3d-zinc:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #18181b, inset 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .animate-scanline {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, rgba(220, 38, 38, 0.1), transparent);
            animation: scanline 2s linear infinite;
            pointer-events: none;
        }

        .animate-bounce-short { animation: bounce 0.5s infinite; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .popup-anim { animation: fade-in-up 0.3s ease-out forwards; }

        /* Flash Alert Animation */
        @keyframes flash-alert {
            0%, 100% { box-shadow: 0 0 30px rgba(220, 38, 38, 0.8); border-color: rgba(220, 38, 38, 1); background-color: rgba(69, 10, 10, 0.95); transform: scale(1.02); }
            50% { box-shadow: 0 0 5px rgba(220, 38, 38, 0.2); border-color: rgba(220, 38, 38, 0.3); background-color: rgba(24, 24, 27, 0.9); transform: scale(1); }
        }
        .animate-flash { animation: flash-alert 1s infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body>
    <div id="root">
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Sarabun','Segoe UI',Tahoma,sans-serif;background:#09090b;color:#f8fafc;">
            <div style="max-width:520px;width:100%;background:#18181b;border:1px solid #3f3f46;border-radius:16px;padding:24px;box-shadow:0 18px 42px rgba(0,0,0,.28);">
                <div style="font-size:13px;font-weight:800;color:#f87171;letter-spacing:.08em;text-transform:uppercase;">Loading X-ray Sync</div>
                <h1 style="margin:10px 0 8px;font-size:24px;line-height:1.25;">กำลังเปิดระบบติดตาม X-ray</h1>
                <p style="margin:0;color:#a1a1aa;line-height:1.7;">หากหน้านี้ไม่เปลี่ยนเป็นระบบหลัก แสดงว่า React/Babel หรือไฟล์จาก CDN ยังโหลดไม่สำเร็จ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วรีเฟรช หรือเปิดไฟล์นี้ในแท็บใหม่</p>
            </div>
        </div>
    </div>

    <script type="text/plain" id="app-source">
        /** @jsxRuntime classic */
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Helper: Icons ---
        const createIcon = (iconName) => ({ size = 24, className = "", ...props }) => {
            const iconData = lucide.icons[iconName] || lucide.icons.HelpCircle;
            return (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {iconData.map(([tag, attrs], i) => React.createElement(tag, { ...attrs, key: i }))}
                </svg>
            );
        };

        const Icons = {
            Activity: createIcon('Activity'), Ambulance: createIcon('Ambulance'), FileText: createIcon('FileText'),
            Plus: createIcon('Plus'), X: createIcon('X'), Database: createIcon('Database'), Camera: createIcon('Camera'),
            Image: createIcon('Image'), Bell: createIcon('Bell'), AlertCircle: createIcon('AlertCircle'),
            CheckCircle: createIcon('CheckCircle'), User: createIcon('User'), Loader2: createIcon('Loader2'),
            Monitor: createIcon('Monitor'), Zap: createIcon('Zap'), LogOut: createIcon('LogOut'), Lock: createIcon('Lock'),
            Code: createIcon('Code'), Settings: createIcon('Settings'), Maximize: createIcon('Maximize'), Minimize: createIcon('Minimize')
        };

        // --- Helper: Image Compression (Optimized for GAS) ---
        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // ปรับลดความกว้างลงเหลือ 600px เพื่อลดขนาดไฟล์เวลาแปลงเป็น Base64
                        const MAX_WIDTH = 600; 
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) { 
                            height *= MAX_WIDTH / width; 
                            width = MAX_WIDTH; 
                        }
                        
                        canvas.width = width; 
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // เติมพื้นหลังสีขาวป้องกันกรณีภาพต้นฉบับเป็น PNG โปร่งใส
                        ctx.fillStyle = "#FFFFFF";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // พยายามแปลงเป็น WebP ก่อน (ขนาดจะเล็กกว่า JPEG มาก) โดยลด Quality ลงเหลือ 0.5 (50%)
                        let compressedDataUrl = canvas.toDataURL('image/webp', 0.5);
                        
                        // ถ้าเบราว์เซอร์เก่าไม่รองรับ WebP (มันจะคืนค่าเป็น image/png) ให้สลับไปใช้ JPEG แทน
                        if (compressedDataUrl.startsWith('data:image/png') || compressedDataUrl === 'data:,') {
                            compressedDataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        }
                        
                        resolve(compressedDataUrl);
                    }
                }
            });
        };

        // --- Helper: Convert Google Drive Link to Direct Image URL ---
        const getRenderableImageUrl = (url) => {
            if (!url) return null;
            // ถ้าเป็นลิงก์ของ Google Drive ให้สกัดเอา ID มาดึงรูปแบบ Thumbnail ถึงจะแสดงในเว็บได้
            if (url.includes('drive.google.com')) {
                const match = url.match(/id=([^&]+)/);
                if (match && match[1]) {
                    return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1200`;
                }
            }
            return url; // ถ้าไม่ใช่ลิงก์ Google Drive ก็คืนค่าเดิมกลับไป
        };

        // --- Sound Helper ---
        const playAlertSound = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                // ใช้ Waveform แบบ Sawtooth (ฟันเลื่อย) เสียงจะแหลมและดังกว่า Sine
                osc.type = 'sawtooth'; 
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                const now = ctx.currentTime;
                
                // Siren Effect: กวาดเสียงขึ้นและลง (Wail Siren)
                osc.frequency.setValueAtTime(600, now); // เริ่มที่ 600Hz
                osc.frequency.linearRampToValueAtTime(1500, now + 0.4); // หวีดขึ้นไป 1500Hz
                osc.frequency.linearRampToValueAtTime(600, now + 0.8);  // หวีดลงมา 600Hz
                
                // Volume Control (Loud)
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.6, now + 0.4); // ดังสุดตอนเสียงแหลม
                gain.gain.linearRampToValueAtTime(0.3, now + 0.8);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0); // ค่อยๆ เงียบ
                
                osc.start(now);
                osc.stop(now + 1.0); // เล่นเสียงยาว 1 วินาที
            } catch (e) { console.error("Sound error", e); }
        };

        const api = {
            async post(url, action, data = {}) {
                if (!url) throw new Error("Please set API URL");
                const response = await fetch(url + `?action=${action}`, { 
                    method: 'POST', 
                    body: JSON.stringify(data),
                    redirect: 'follow'
                });
                return await response.json();
            },
            async get(url, action) {
                if (!url) throw new Error("Please set API URL");
                const response = await fetch(url + `?action=${action}`, { redirect: 'follow' });
                return await response.json();
            }
        };

        // --- DARK MODE STATUS COLORS ---
        const STATUS_FLOW = {
            WAITING: { label: 'รอ X-ray', color: 'bg-yellow-900/30 text-yellow-300 border border-yellow-700/50 shadow-[0_0_10px_rgba(234,179,8,0.2)]' },
            READY_FOR_PATIENT: { label: 'กำลัง X-ray', color: 'bg-blue-900/30 text-blue-300 border border-blue-700/50 shadow-[0_0_10px_rgba(59,130,246,0.2)]' },
            ARRIVED_XRAY: { label: 'ถึงห้อง X-ray', color: 'bg-purple-900/30 text-purple-300 border border-purple-700/50 shadow-[0_0_10px_rgba(168,85,247,0.2)]' },
            DONE: { label: 'เสร็จสิ้น', color: 'bg-green-900/30 text-green-300 border border-green-700/50 shadow-[0_0_10px_rgba(34,197,94,0.2)]' },
        };

        const PRIORITY_LEVELS = {
            STAT: { label: 'STAT ด่วนที่สุด', color: 'bg-gradient-to-r from-red-700 to-red-600 text-white animate-pulse border border-red-500 shadow-[0_0_15px_rgba(220,38,38,0.6)]' },
            URGENT: { label: 'URGENT ด่วน', color: 'bg-gradient-to-r from-orange-700 to-orange-600 text-white border border-orange-500' },
            ROUTINE: { label: 'ROUTINE ปกติ', color: 'bg-gradient-to-r from-emerald-700 to-emerald-600 text-white border border-emerald-500' },
        };

        // --- DEVELOPER FOOTER COMPONENT ---
        const DeveloperFooter = ({ className }) => (
            <div className={`text-center py-6 relative z-10 ${className}`}>
                <div className="flex items-center justify-center gap-3 mb-2 opacity-50">
                    <div className="h-px w-12 bg-gradient-to-r from-transparent to-red-500"></div>
                    <span className="text-[10px] text-red-500 font-bold uppercase tracking-[0.2em] flex items-center gap-1">
                        <Icons.Code size={10} /> Developer
                    </span>
                    <div className="h-px w-12 bg-gradient-to-l from-transparent to-red-500"></div>
                </div>
                <div className="space-y-0.5">
                    <p className="text-sm text-slate-300 font-light tracking-wide">นายทวี แสนสนอง</p>
                    <p className="text-[10px] text-slate-500 uppercase tracking-wider">หัวหน้างานอุบัติเหตุฉุกเฉินและนิติเวช</p>
                    <p className="text-[10px] text-red-400 font-bold uppercase tracking-wider">โรงพยาบาลเสลภูมิ</p>
                </div>
            </div>
        );

        // --- LOGIN COMPONENT ---
        const LoginScreen = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (username === 'ER' && password === '1234') {
                    onLogin('er');
                } else if (username === 'xr' && password === '1234') {
                    onLogin('xray');
                } else {
                    setError('Username หรือ Password ไม่ถูกต้อง');
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="fixed inset-0 z-0 pointer-events-none opacity-20" 
                         style={{backgroundImage: 'linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px)', backgroundSize: '30px 30px'}}>
                    </div>
                    
                    <div className="glass-panel p-8 rounded-2xl w-full max-w-sm relative z-10 border border-zinc-700 shadow-[0_0_50px_rgba(220,38,38,0.2)] mb-8">
                        <div className="text-center mb-8">
                             <div className="w-16 h-16 bg-gradient-to-br from-red-600 to-black rounded-2xl border border-red-500 flex items-center justify-center text-white font-bold shadow-[0_0_20px_rgba(220,38,38,0.6)] transform rotate-3 mx-auto mb-4">
                                <Icons.Zap size={32} className="text-white fill-current" />
                            </div>
                            <h1 className="text-2xl font-bold text-white tracking-wider">HOS<span className="text-red-500">SYNC</span></h1>
                            <p className="text-slate-500 text-sm uppercase tracking-widest mt-1">Authentication</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Username</label>
                                <div className="relative">
                                    <div className="absolute left-3 top-3.5 text-zinc-500"><Icons.User size={16}/></div>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-black/40 border border-zinc-700 p-3 pl-10 rounded-xl text-white focus:border-red-500 outline-none transition-colors" placeholder="ER หรือ xr" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Password</label>
                                <div className="relative">
                                    <div className="absolute left-3 top-3.5 text-zinc-500"><Icons.Lock size={16}/></div>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-black/40 border border-zinc-700 p-3 pl-10 rounded-xl text-white focus:border-red-500 outline-none transition-colors" placeholder="••••" />
                                </div>
                            </div>
                            
                            {error && (
                                <div className="p-3 bg-red-900/20 border border-red-900/50 rounded-lg text-red-400 text-xs text-center flex items-center justify-center gap-2 animate-bounce-short">
                                    <Icons.AlertCircle size={14}/> {error}
                                </div>
                            )}

                            <button type="submit" className="w-full btn-3d-red text-white py-3 rounded-xl font-bold uppercase text-sm mt-4 shadow-lg hover:shadow-red-900/50 transition-all transform active:scale-95">
                                Login System
                            </button>
                        </form>
                    </div>

                    <DeveloperFooter />
                </div>
            );
        };

        function App() {
            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('hos_xray_config_v3');
                return saved ? JSON.parse(saved) : { 
                    apiUrl: 'https://script.google.com/macros/s/AKfycbz4hrSQk5YS8Ml4wgVC7ko_k10w60eQlH3ovw_MEG60ceXX1q5tqI13tbfBjt0hVdLsOA/exec', 
                    useMock: false 
                };
            });
            const [showConfig, setShowConfig] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [activeTab, setActiveTab] = useState(null); 
            const [orders, setOrders] = useState([]);
            const [showOrderForm, setShowOrderForm] = useState(false);
            const [newOrderAlert, setNewOrderAlert] = useState(null);
            const [userRole, setUserRole] = useState(null); 
            const [viewImage, setViewImage] = useState(null); 
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [connectionStatus, setConnectionStatus] = useState('connecting');
            
            const prevOrdersRef = useRef([]);

            // Init Mock Data
            const mockInitialData = [
                {
                    id: 'DEMO-001', hn: '66001234', patientName: 'นายสมชาย ใจดี', type: 'Portable Chest', priority: 'STAT', transport: 'เตียง', status: 'WAITING', note: 'Demo Data',
                    createdAt: new Date().toISOString(), logs: [], attachment: null
                }
            ];

            useEffect(() => {
                localStorage.setItem('hos_xray_config_v3', JSON.stringify(config));
                fetchData();
                let interval;
                if (!config.useMock && config.apiUrl) { interval = setInterval(fetchData, 5000); }
                return () => clearInterval(interval);
            }, [config]);

            useEffect(() => {
                if (prevOrdersRef.current.length > 0) {
                    const newIncomingOrders = orders.filter(o => 
                        !prevOrdersRef.current.find(po => po.id === o.id) && o.status === 'WAITING'
                    );
                    if (newIncomingOrders.length > 0) {
                        setNewOrderAlert(newIncomingOrders[0]);
                    }
                }
                prevOrdersRef.current = orders;
            }, [orders]);

            useEffect(() => {
                let interval;
                if (newOrderAlert) {
                    playAlertSound(); 
                    interval = setInterval(() => {
                        playAlertSound();
                    }, 2000); 
                }
                return () => clearInterval(interval);
            }, [newOrderAlert]);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch((e) => console.log(e));
                    setIsFullscreen(true);
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen(); 
                        setIsFullscreen(false);
                    }
                }
            };

            const fetchData = async () => {
                if (config.useMock) {
                    if (orders.length === 0) setOrders(mockInitialData);
                    setConnectionStatus('mock');
                    return;
                }
                if (!config.apiUrl) {
                    setConnectionStatus('offline');
                    return; 
                }

                try {
                    const res = await api.get(config.apiUrl, 'get_orders');
                    if (res && res.orders) {
                        setOrders(res.orders);
                        setConnectionStatus('online');
                    }
                } catch (err) { 
                    console.log("API Connection Error:", err.message);
                    setConnectionStatus('error');
                    // แสดง Mock Data ชั่วคราวเมื่อเกิด Error เพื่อให้หน้าจอทำงานต่อไปได้
                    if (orders.length === 0) {
                        setOrders(mockInitialData);
                    }
                } 
            };

            const handleCreateOrder = async (orderData) => {
                setIsLoading(true);
                const payload = { ...orderData };
                if (config.useMock) {
                    setTimeout(() => {
                        const newOrder = {
                            id: `ORD-${Date.now().toString().slice(-4)}`,
                            ...payload, status: 'WAITING', createdAt: new Date().toISOString(), logs: []
                        };
                        setOrders(prev => [newOrder, ...prev]);
                        setIsLoading(false); setShowOrderForm(false);
                    }, 500);
                } else {
                    if (!config.apiUrl) {
                        alert('กรุณาตั้งค่า API URL ก่อนใช้งาน');
                        setIsLoading(false);
                        return;
                    }
                    try {
                        await api.post(config.apiUrl, 'create_order', payload);
                        await fetchData(); setShowOrderForm(false);
                    } catch (err) { alert('Error: ' + err.message); }
                    setIsLoading(false);
                }
            };

            const updateStatus = async (orderId, newStatus) => {
                const prevStatusOrders = [...orders];
                setOrders(orders.map(o => o.id === orderId ? { ...o, status: newStatus } : o));
                if (!config.useMock) {
                    if (!config.apiUrl) return;
                    try { await api.post(config.apiUrl, 'update_status', { orderId, newStatus }); } 
                    catch (err) { alert('Update failed'); setOrders(prevStatusOrders); }
                }
            };

            // Test Alert Trigger
            const triggerTestAlert = () => {
                setNewOrderAlert({
                    id: 'TEST-ALERT',
                    patientName: 'ทดสอบ แจ้งเตือน',
                    type: 'Test System',
                    priority: 'STAT',
                    transport: '-',
                    status: 'WAITING'
                });
            };

            if (!userRole) {
                return <LoginScreen onLogin={(role) => {
                    setUserRole(role);
                    setActiveTab(role === 'er' ? 'er' : 'xray'); 
                }} />;
            }

            return (
                <div className="min-h-screen pb-28 relative overflow-hidden">
                    <div className="fixed inset-0 z-0 pointer-events-none opacity-20" 
                         style={{backgroundImage: 'linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px)', backgroundSize: '30px 30px'}}>
                    </div>

                    {/* Navbar */}
                    <nav className="glass-panel border-b border-red-900/30 sticky top-0 z-30 shadow-lg shadow-black/50">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center relative overflow-hidden">
                            <div className="flex items-center gap-3 z-10">
                                <div className="w-10 h-10 bg-gradient-to-br from-red-600 to-black rounded-lg border border-red-500 flex items-center justify-center text-white font-bold shadow-[0_0_15px_rgba(220,38,38,0.5)] transform rotate-3">
                                    <Icons.Zap size={20} className="text-white fill-current" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl leading-none text-white tracking-wider flex items-center gap-2">

                        <div className="flex gap-4 pt-4 border-t border-zinc-800">
                            <button onClick={onClose} disabled={isSubmitting} className="flex-1 bg-transparent border border-zinc-600 text-zinc-400 py-3 rounded-xl font-bold hover:text-white hover:border-white transition-colors uppercase text-sm">Cancel</button>
                            <button onClick={() => form.patientName && form.hn && onSubmit(form)} disabled={isSubmitting || isCompressing || !form.patientName || !form.hn} className="flex-1 btn-3d-red text-white py-3 rounded-xl font-bold uppercase text-sm flex justify-center items-center gap-2 disabled:opacity-50 disabled:grayscale transition-all">
                                {isSubmitting ? (
                                    <><Icons.Loader2 className="animate-spin" size={18}/> กำลังส่งข้อมูล...</>
                                ) : (
                                    'Submit Order'
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        (function runAppSource() {
            const source = document.getElementById('app-source');
            const root = document.getElementById('root');
            const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]);
            const showError = (error) => {
                console.error(error);
                root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Segoe UI,Tahoma,sans-serif;background:#18181b;color:#f8fafc;"><div style="max-width:620px;background:#27272a;border:1px solid #fda4af;border-radius:16px;padding:24px;box-shadow:0 18px 42px rgba(0,0,0,.22);"><div style="font-size:13px;font-weight:800;color:#fb7185;text-transform:uppercase;letter-spacing:.08em;">Script Error</div><h1 style="margin:10px 0 8px;font-size:22px;">เปิดระบบไม่สำเร็จ</h1><p style="margin:0;color:#d4d4d8;line-height:1.7;">' + escapeHtml(error && error.message ? error.message : error) + '</p></div></div>';
            };
            try {
                if (!window.React || !window.ReactDOM || !window.Babel) throw new Error('โหลด React / ReactDOM / Babel ไม่สำเร็จ');
                (0, eval)(Babel.transform(source.textContent, { presets: ['env'], plugins: [['transform-react-jsx', { runtime: 'classic' }]] }).code);
            } catch (error) {
                showError(error);
            }
        })();
    </script>
</body>
</html>
